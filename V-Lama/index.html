<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IT'aawun - Login</title>

  <!-- ADDED: must load this before any supabase code -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, rgba(0, 31, 63, 0.85), #6A5ACD),
        url('bi1.png') no-repeat center center / cover;
    }

    .login-container {
      background: #fff;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.25);
      width: 360px;
      text-align: center;
    }

    .logo {
      font-size: 28px;
      font-weight: bold;
      color: #001f3f;
      margin-bottom: 10px;
    }

    .tagline {
      font-size: 14px;
      color: #666;
      margin-bottom: 25px;
    }

    h2 {
      margin-bottom: 20px;
      color: #001f3f;
    }

    input {
      width: 90%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #001f3f;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      transition: 0.3s;
    }

    button:hover {
      background: #003366;
    }

    .links {
      margin-top: 15px;
      font-size: 14px;
    }

    .links a {
      color: #001f3f;
      text-decoration: none;
    }

    .links a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <div class="login-container">
    <div class="logo">IT'aawun</div>
    <div class="tagline">Student Freelance Collaboration</div>
    <h2>Login</h2>
    <div id="msg" style="color:red; font-size:13px; min-height:18px"></div>
    <input id="email" type="email" placeholder="Email" required>
    <input id="pass" type="password" placeholder="Password" required>
    <button onclick="doLogin()">Login</button>
    <button onclick="doSignup()" style="background:#6b21a8; margin-top:8px">Create Account</button>

    <div class="links">
      <p><a href="#">Create Account</a> | <a href="#">Forgot Password?</a></p>
    </div>
  </div>

  <!-- ALL script is here, inside body, after the HTML above -->
  <script>
    const SUPABASE_URL = 'https://fyahebgkacjsxmiwteny.supabase.co'
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ5YWhlYmdrYWNqc3htaXd0ZW55Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAyNTg3NDEsImV4cCI6MjA4NTgzNDc0MX0.eIAWIPzB6EjW7rPKHLSsc2ryUBQ7yicRK1I-SxXg_2Y'

    // FIXED: save the client into a variable called "db"
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

    // Check if already logged in
    db.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = 'home.html'
    })

    async function doLogin() {
      const email = document.getElementById('email').value
      const pass = document.getElementById('pass').value
      const msg = document.getElementById('msg')
      msg.textContent = 'Logging in...'

      const { error } = await db.auth.signInWithPassword({ email, password: pass })
      if (error) { msg.textContent = error.message; return }
      window.location.href = 'home.html'
    }

    async function doSignup() {
      const email = document.getElementById('email').value
      const pass = document.getElementById('pass').value
      const msg = document.getElementById('msg')
      msg.textContent = 'Creating account...'

      const { error } = await db.auth.signUp({ email, password: pass })
      if (error) { msg.textContent = error.message; return }
      msg.style.color = 'green'
      msg.textContent = 'Account created! You can now log in.'
    }
  </script>

</body>

</html>
