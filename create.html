<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Service - IT'aawun</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* Body & Gradient Background */
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: linear-gradient(-45deg, #00008B, #ffffff, #3F00FF);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      color: #333;
    }

    @keyframes gradientBG {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    .back-button {
      padding: 10px 40px;
      display: flex;
      align-items: center;
      cursor: pointer;
      font-weight: bold;
      color: #001f3f;
      font-size: 16px;
    }

    .back-button i {
      margin-right: 8px;
    }

    .back-button:hover {
      color: #004f80;
    }

    /* Header */
    header {
      background: rgba(0, 0, 0, 0.2);
      color: white;
      padding: 15px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header .logo {
      font-size: 22px;
      font-weight: bold;
      cursor: pointer;
    }

    .profile-container {
      position: relative;
    }

    .profile-pic {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid white;
    }

    .dropdown {
      display: none;
      position: absolute;
      right: 0;
      top: 50px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      z-index: 100;
    }

    .dropdown a {
      display: block;
      padding: 10px;
      text-decoration: none;
      color: #333;
      font-size: 14px;
    }

    .dropdown a:hover {
      background: #f0f0f0;
    }

    /* Container */
    .container {
      max-width: 500px;
      width: 95%;
      margin: 30px auto;
      background: rgba(255, 255, 255, 0.95);
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
    }

    h2 {
      color: #001f3f;
      text-align: center;
      margin-bottom: 20px;
      text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.7);
    }

    label {
      display: block;
      margin: 12px 0 5px;
      font-size: 14px;
    }

    input,
    textarea,
    select {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
      box-sizing: border-box;
    }

    textarea {
      resize: none;
    }

    button {
      margin-top: 15px;
      padding: 12px 15px;
      border: none;
      border-radius: 8px;
      background: #001f3f;
      color: white;
      font-size: 16px;
      cursor: pointer;
      width: 100%;
      font-weight: bold;
      transition: .3s;
    }

    button:hover {
      background: #004f80;
    }
  </style>
</head>

<body>

  <header>
    <div class="logo" onclick="window.location.href='home.html'">IT'aawun</div>
    <div class="profile-container">
      <img src="assets/images/ipey.jpeg" alt="Profile" class="profile-pic" onclick="toggleDropdown()">
      <div class="dropdown" id="dropdownMenu">
        <a href="profile.html">My Profile</a>
        <a href="#">Settings</a>
        <a href="index.html">Logout</a>
      </div>
    </div>
  </header>

  <div class="back-button" onclick="window.location.href='home.html'">
    <i class="fa-solid fa-arrow-left"></i> Back
  </div>

  <div class="container">
    <h2>Create Your Service</h2>
    <form id="serviceForm">
      <label for="serviceType">Service Type</label>
      <select id="serviceType" required>
        <option value="">Select Type</option>
        <option value="offered">Service Offered</option>
        <option value="needed">Service Needed</option>
      </select>

      <label for="title">Service Title</label>
      <input type="text" id="title" required>

      <label for="desc">Description</label>
      <textarea id="desc" rows="4" required></textarea>

      <label for="price">Price (RM)</label>
      <input type="number" id="price" required>

      <label for="category">Category</label>
      <select id="category" required>
        <option value="">Select Category</option>
        <option value="design">Design</option>
        <option value="coding">Coding</option>
        <option value="writing">Writing</option>
        <option value="tutoring">Tutoring</option>
        <option value="photography">Photography</option>
      </select>

      <label for="location">Location</label>
      <input type="text" id="location" placeholder="City, Area, etc." required>

      <label for="time">Time Available / Needed</label>
      <select id="time" required>
        <option value="">Select Time</option>
        <option value="Mon-Fri 9am-5pm">Mon-Fri 9am-5pm</option>
        <option value="Mon-Fri 10am-6pm">Mon-Fri 10am-6pm</option>
        <option value="Weekends">Weekends</option>
        <option value="Evenings">Evenings</option>
        <option value="Flexible">Flexible</option>
      </select>

      <label for="whatsapp">WhatsApp Number *</label>
      <input type="text" id="whatsapp" placeholder="60123456789" required>

      <label for="telegram">Telegram Username *</label>
      <input type="text" id="telegram" placeholder="username" required>

      <label for="image">Image URL</label>
      <input type="text" id="image" placeholder="https://example.com/image.jpg">

      <label for="contact">Email (optional)</label>
      <input type="email" id="contact" placeholder="your@email.com">

      <button type="submit">Submit Service</button>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://fyahebgkacjsxmiwteny.supabase.co'
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ5YWhlYmdrYWNqc3htaXd0ZW55Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAyNTg3NDEsImV4cCI6MjA4NTgzNDc0MX0.eIAWIPzB6EjW7rPKHLSsc2ryUBQ7yicRK1I-SxXg_2Y'
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

    let currentUser = null

    // Auth check - redirect to login if not logged in
    db.auth.getSession().then(({ data: { session } }) => {
      if (!session) { window.location.href = 'index.html'; return }
      currentUser = session.user
    })

    function toggleDropdown() {
      const m = document.getElementById("dropdownMenu");
      m.style.display = (m.style.display === "block") ? "none" : "block";
    }
    window.onclick = function (e) {
      if (!e.target.matches('.profile-pic')) {
        document.getElementById("dropdownMenu").style.display = "none";
      }
    }

    document.getElementById("serviceForm").addEventListener("submit", async function (e) {
      e.preventDefault();

      if (!currentUser) { alert('Please login first.'); return; }

      const type = document.getElementById("serviceType").value;
      const title = document.getElementById("title").value;
      const desc = document.getElementById("desc").value;
      const price = parseFloat(document.getElementById("price").value);
      const category = document.getElementById("category").value;
      const location = document.getElementById("location").value;
      const time = document.getElementById("time").value;
      const contact = document.getElementById("contact").value || null;
      const whatsapp = document.getElementById("whatsapp").value;
      const telegram = document.getElementById("telegram").value;
      let image = document.getElementById("image").value;
      if (!image) image = "https://via.placeholder.com/220x120";

      const btn = this.querySelector('button[type="submit"]');
      const originalText = btn.textContent;
      btn.disabled = true;
      btn.textContent = 'Submitting...';

      // Insert into Supabase services table
      const serviceData = {
        vendor_id: currentUser.id,
        title: title,
        description: desc,
        price: price,
        category: category,
        location: location,
        time: time,
        contact: contact,
        whatsapp: whatsapp,
        telegram: telegram,
        image: image,
        type: type,
        status: 'active'
      }

      console.log('Submitting service data:', serviceData)

      const { data, error } = await db.from('services').insert(serviceData).select()

      btn.disabled = false;
      btn.textContent = originalText;

      if (error) {
        console.error('Supabase error details:', error)
        alert('Error submitting service: ' + error.message + '\n\nCheck browser console (F12) for column name details.');
        return;
      }

      alert('Service submitted successfully!');
      document.getElementById("serviceForm").reset();

      // Redirect based on service type
      if (type === 'needed') {
        window.location.href = 'needed.html';
      } else {
        window.location.href = 'find.html';
      }
    });
  </script>

</body>

</html>
