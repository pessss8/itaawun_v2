<!DOCTYPE html>
<html lang="en">

<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Create Service - iTa'awun</title>
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
 <style>
 /* Body & Gradient Background */
 body {
 margin: 0;
 font-family: 'Segoe UI', sans-serif;
 min-height: 100vh;
 display: flex;
 flex-direction: column;
 background: linear-gradient(-45deg, #00008B, #ffffff, #3F00FF);
 background-size: 400% 400%;
 animation: gradientBG 15s ease infinite;
 color: #333;
 }

 @keyframes gradientBG {
 0% {
 background-position: 0% 50%;
 }

 50% {
 background-position: 100% 50%;
 }

 100% {
 background-position: 0% 50%;
 }
 }

 .back-button {
 padding: 10px 40px;
 display: flex;
 align-items: center;
 cursor: pointer;
 font-weight: bold;
 color: #001f3f;
 font-size: 16px;
 }

 .back-button i {
 margin-right: 8px;
 }

 .back-button:hover {
 color: #004f80;
 }

 /* Header */
 header {
 background: rgba(0, 0, 0, 0.2);
 color: white;
 padding: 15px 40px;
 display: flex;
 justify-content: space-between;
 align-items: center;
 }

 header .logo {
 font-size: 22px;
 font-weight: bold;
 cursor: pointer;
 }

 .profile-container {
 position: relative;
 display: inline-block;
 }
 .profile-container::before {
 content: '';
 position: absolute;
 top: -10px;
 left: -10px;
 right: -10px;
 bottom: -10px;
 z-index: -1;
 }

 .profile-pic {
 width: 40px;
 height: 40px;
 border-radius: 50%;
 cursor: pointer;
 border: 2px solid white;
 transition: transform 0.2s, box-shadow 0.2s;
 display: block;
 }
 .profile-container:hover .profile-pic {
 transform: scale(1.1);
 box-shadow: 0 0 0 3px rgba(255,255,255,0.5);
 }

 .dropdown {
 display: none;
 position: absolute;
 right: 0;
 top: 48px;
 background: white;
 color: #333;
 border-radius: 10px;
 box-shadow: 0 6px 20px rgba(0,0,0,0.25);
 min-width: 160px;
 z-index: 100;
 overflow: hidden;
 animation: fadeIn 0.15s ease;
 }
 @keyframes fadeIn {
 from { opacity: 0; transform: translateY(-6px); }
 to { opacity: 1; transform: translateY(0); }
 }
 .dropdown.open { display: block; }
 .dropdown a {
 display: block; padding: 11px 16px;
 text-decoration: none; color: #333; font-size: 14px;
 transition: background 0.15s;
 }
 .dropdown a:hover { background: #f5f0ff; color: #6b21a8; }
 .dropdown .divider { border: none; border-top: 1px solid #eee; margin: 0; }
 .dropdown .logout-link { color: #dc2626 !important; }
 .dropdown .logout-link:hover { background: #fef2f2 !important; }
 .vendor-link.hidden { display: none; }

 /* Container */
 .container {
 max-width: 500px;
 width: 95%;
 margin: 30px auto;
 background: rgba(255, 255, 255, 0.95);
 padding: 20px;
 border-radius: 12px;
 box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
 }

 h2 {
 color: #001f3f;
 text-align: center;
 margin-bottom: 20px;
 text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.7);
 }

 label {
 display: block;
 margin: 12px 0 5px;
 font-size: 14px;
 }

 input,
 textarea,
 select {
 width: 100%;
 padding: 10px;
 border-radius: 6px;
 border: 1px solid #ccc;
 font-size: 14px;
 box-sizing: border-box;
 }

 textarea {
 resize: none;
 }

 button {
 margin-top: 15px;
 padding: 12px 15px;
 border: none;
 border-radius: 8px;
 background: #001f3f;
 color: white;
 font-size: 16px;
 cursor: pointer;
 width: 100%;
 font-weight: bold;
 transition: .3s;
 }

 button:hover {
 background: #004f80;
 }
 </style>
</head>

<body>

 <header>
 <div class="logo" onclick="window.location.href='home.html'">iTa'awun</div>
 <div class="profile-container" id="profileContainer" onclick="toggleDropdown(event)">
 <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='38' r='22' fill='%236b21a8'/%3E%3Cellipse cx='50' cy='85' rx='33' ry='22' fill='%236b21a8'/%3E%3C/svg%3E" alt="Profile" class="profile-pic" id="profilePic" onerror="this.onerror=null;this.src='data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27%3E%3Ccircle cx=%2750%27 cy=%2738%27 r=%2722%27 fill=%27%236b21a8%27/%3E%3Cellipse cx=%2750%27 cy=%2785%27 rx=%2733%27 ry=%2722%27 fill=%27%236b21a8%27/%3E%3C/svg%3E'">
 <div class="dropdown" id="profileDropdown">
 <a href="profile.html"> My Profile</a>
 <a href="vendor.html" class="vendor-link hidden" id="vendorDropdownLink"> Vendor Dashboard</a>
 <a href="admin.html" class="hidden" id="adminDropdownLink"> Admin Dashboard</a>
 <hr class="divider">
 <a href="#" onclick="doLogout()"> Logout</a>
 </div>
 </div>
 </header>

 <div class="back-button" onclick="window.location.href='home.html'">
 <i class="fa-solid fa-arrow-left"></i> Back
 </div>

 <div class="container">
 <h2>Create Your Listing</h2>
 <form id="serviceForm">

 <label for="serviceType">What kind of listing is this?</label>
 <select id="serviceType" required onchange="toggleServiceType(this.value)">
 <option value="">Select Type</option>
 <option value="offered">Service Offered — I provide this</option>
 <option value="needed">Service Needed — I need someone for this</option>
 </select>

 <label for="title">Title</label>
 <input type="text" id="title" required>

 <label for="desc">Description</label>
 <textarea id="desc" rows="4" required></textarea>

 <label>Pricing</label>
 <div style="display:flex;gap:8px;margin-bottom:8px;">
 <button type="button" id="btnFixed" onclick="setPricingMode('fixed')" style="flex:1;padding:9px;border-radius:6px;border:2px solid #6b21a8;background:#6b21a8;color:#fff;cursor:pointer;font-size:13px;font-weight:600">Fixed</button>
 <button type="button" id="btnNeg" onclick="setPricingMode('negotiable')" style="flex:1;padding:9px;border-radius:6px;border:2px solid #6b21a8;background:#fff;color:#6b21a8;cursor:pointer;font-size:13px;font-weight:600">Negotiable / Range</button>
 </div>
 <div id="fixedPriceSection">
 <input type="number" id="price" step="0.5" min="0" placeholder="Price (RM)">
 </div>
 <div id="negPriceSection" style="display:none">
 <div style="display:flex;gap:8px;align-items:center;">
 <input type="number" id="priceMin" step="0.5" min="0" placeholder="Min (RM)" style="margin-bottom:0">
 <span style="color:#666;flex-shrink:0;font-size:16px">–</span>
 <input type="number" id="priceMax" step="0.5" min="0" placeholder="Max (RM)" style="margin-bottom:0">
 </div>
 </div>

 <label for="category">Category</label>
 <select id="category" required>
 <option value="">Select Category</option>
 <option value="food">Food & Drinks</option>
 <option value="runner">Runner</option>
 <option value="printing">Printing</option>
 <option value="cleaning">Cleaning</option>
 <option value="laundry">Laundry</option>
 <option value="delivery">Delivery</option>
 <option value="tutoring">Tutoring</option>
 <option value="design">Design</option>
 <option value="coding">Coding</option>
 <option value="photography">Photography</option>
 <option value="repair">Repair</option>
 <option value="other">Other</option>
 </select>

 <label for="location">Location</label>
 <input type="text" id="location" placeholder="e.g. Library, Kuliyyah, Online" required>

 <!-- Time Available — shown for Service Offered only -->
 <div id="timeSlotSection">
 <label>Time Available</label>
 <div style="background:#f5f5f5;padding:12px;border-radius:8px;margin-bottom:10px;">
 <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
 <span style="font-size:13px;color:#555;min-width:80px;">Weekday:</span>
 <input type="time" id="weekdayStart" value="09:00" style="flex:1;margin:0;">
 <span>–</span>
 <input type="time" id="weekdayEnd" value="17:00" style="flex:1;margin:0;">
 </div>
 <div style="display:flex;align-items:center;gap:8px;">
 <span style="font-size:13px;color:#555;min-width:80px;">Weekend:</span>
 <input type="time" id="weekendStart" value="10:00" style="flex:1;margin:0;">
 <span>–</span>
 <input type="time" id="weekendEnd" value="18:00" style="flex:1;margin:0;">
 </div>
 </div>
 </div>

 <!-- Urgency & Expiry — shown for Service Needed only -->
 <div id="urgencySection" style="display:none">
 <label>Urgency</label>
 <select id="urgency">
 <option value="asap">ASAP — Need it urgently</option>
 <option value="1_day">Within 1 day</option>
 <option value="3_days">Within 3 days</option>
 <option value="1_week">Within 1 week</option>
 <option value="2_weeks" selected>Within 2 weeks</option>
 <option value="flexible">Flexible</option>
 </select>
 <label>Request Expiry Date</label>
 <input type="date" id="expiry">
 <p style="font-size:12px;color:#888;margin-top:4px;">After this date, the request will be automatically removed.</p>
 </div>

 <label for="whatsapp">WhatsApp Number *</label>
 <input type="text" id="whatsapp" placeholder="60123456789" required>

 <label for="telegram">Telegram Username *</label>
 <input type="text" id="telegram" placeholder="username" required>

 <label for="image">Image (optional)</label>
 <div style="display:flex;flex-direction:column;gap:8px;">
 <input type="text" id="imageUrl" placeholder="Image URL">
 <span style="font-size:12px;color:#888;text-align:center;">— OR —</span>
 <input type="file" id="imageFile" accept="image/*" style="padding:8px;">
 </div>

 <label for="contact">Email (optional)</label>
 <input type="email" id="contact" placeholder="your@email.com">

 <div id="variantsSection">
 <label style="margin-top:8px;font-weight:600">Product Variants <span style="font-weight:normal;font-size:12px;color:#888">(optional)</span></label>
 <div id="variantsList" style="display:flex;flex-direction:column;gap:8px;margin-bottom:8px;"></div>
 <button type="button" onclick="addVariant()" style="background:#f3e8ff;color:#6b21a8;border:1.5px dashed #6b21a8;font-size:13px;padding:8px;margin-top:0;width:100%;">+ Add Variant Option</button>
 </div>

 <button type="submit">Submit for Approval</button>
 </form>
 </div>

 <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
 <script>
 const SUPABASE_URL = 'https://fyahebgkacjsxmiwteny.supabase.co'
 const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ5YWhlYmdrYWNqc3htaXd0ZW55Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAyNTg3NDEsImV4cCI6MjA4NTgzNDc0MX0.eIAWIPzB6EjW7rPKHLSsc2ryUBQ7yicRK1I-SxXg_2Y'
 const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

 let currentUser = null

 // Auth check
 (async function initCreate() {
 const { data: { session } } = await db.auth.getSession()
 if (!session) { window.location.href = 'index.html'; return }
 currentUser = session.user

 // Load profile
 const { data: profile } = await db.from('profiles').select('role, avatar_url').eq('id', session.user.id).single()
 if (profile?.avatar_url) document.getElementById('profilePic').src = profile.avatar_url + '?t=' + Date.now()
 if (profile?.role === 'vendor' || profile?.role === 'admin') {
 const vendorLink = document.getElementById('vendorDropdownLink')
 if (vendorLink) vendorLink.classList.remove('hidden')
 }
 if (profile?.role === 'admin') {
 document.getElementById('adminDropdownLink')?.classList.remove('hidden')
 }
 })()

 // Service type toggle
 function toggleServiceType(val) {
   const isNeeded = val === 'needed'
   document.getElementById('timeSlotSection').style.display = isNeeded ? 'none' : 'block'
   document.getElementById('urgencySection').style.display = isNeeded ? 'block' : 'none'
   document.getElementById('variantsSection').style.display = isNeeded ? 'none' : 'block'
   if (isNeeded) {
     const d = new Date(); d.setDate(d.getDate() + 14)
     document.getElementById('expiry').value = d.toISOString().split('T')[0]
   }
 }

 // Pricing mode toggle
 let _pricingMode = 'fixed'
 function setPricingMode(mode) {
   _pricingMode = mode
   const isNeg = mode === 'negotiable'
   document.getElementById('fixedPriceSection').style.display = isNeg ? 'none' : 'block'
   document.getElementById('negPriceSection').style.display = isNeg ? 'block' : 'none'
   document.getElementById('btnFixed').style.cssText = `flex:1;padding:9px;border-radius:6px;border:2px solid #6b21a8;background:${isNeg ? '#fff' : '#6b21a8'};color:${isNeg ? '#6b21a8' : '#fff'};cursor:pointer;font-size:13px;font-weight:600`
   document.getElementById('btnNeg').style.cssText = `flex:1;padding:9px;border-radius:6px;border:2px solid #6b21a8;background:${isNeg ? '#6b21a8' : '#fff'};color:${isNeg ? '#fff' : '#6b21a8'};cursor:pointer;font-size:13px;font-weight:600`
 }

 // Variants management
 let variantCount = 0
 function addVariant() {
 variantCount++
 const id = 'variant-' + variantCount
 const row = document.createElement('div')
 row.id = id
 row.style.cssText = 'display:flex;gap:8px;align-items:center;'
 row.innerHTML = `
 <input type="text" placeholder="Option name (e.g. Large)" style="flex:2;margin:0"
 class="variant-name" required>
 <input type="number" placeholder="Price (RM)" step="0.50" min="0" style="flex:1;margin:0"
 class="variant-price" required>
 <button type="button" onclick="document.getElementById('${id}').remove()"
 style="background:#fee2e2;color:#dc2626;border:none;border-radius:6px;padding:8px 12px;font-size:13px;cursor:pointer;margin:0;width:auto;">x</button>`
 document.getElementById('variantsList').appendChild(row)
 }

 function toggleDropdown(e) {
   e.stopPropagation()
   document.getElementById('profileDropdown').classList.toggle('open')
 }
 document.addEventListener('click', () => document.getElementById('profileDropdown')?.classList.remove('open'))

 async function doLogout() {
 const { error } = await db.auth.signOut()
 if (error) console.error('Logout error:', error)
 window.location.replace('index.html?logged=out')
 }

 document.getElementById("serviceForm").addEventListener("submit", async function (e) {
 e.preventDefault()
 if (!currentUser) { alert('Please login first.'); return }

 const type = document.getElementById("serviceType").value
 if (!type) { alert('Please select a service type.'); return }

 const isNeeded = type === 'needed'
 const title = document.getElementById("title").value
 const desc = document.getElementById("desc").value
 const category = document.getElementById("category").value
 const location = document.getElementById("location").value
 const contact = document.getElementById("contact").value || null
 const whatsapp = document.getElementById("whatsapp").value
 const telegram = document.getElementById("telegram").value

 // Pricing
 let finalPrice = null, priceMin = null, priceMax = null
 if (_pricingMode === 'fixed') {
   finalPrice = parseFloat(document.getElementById('price').value) || null
 } else {
   priceMin = parseFloat(document.getElementById('priceMin').value) || null
   priceMax = parseFloat(document.getElementById('priceMax').value) || null
   finalPrice = priceMin
 }

 // Time (offered only)
 let time = null
 if (!isNeeded) {
   const wdTime = `Weekdays ${document.getElementById('weekdayStart').value}–${document.getElementById('weekdayEnd').value}`
   const weTime = `Weekends ${document.getElementById('weekendStart').value}–${document.getElementById('weekendEnd').value}`
   time = `${wdTime}, ${weTime}`
 }

 // Urgency + expiry (needed only)
 const urgency = isNeeded ? document.getElementById('urgency').value : null
 const expiryVal = isNeeded ? document.getElementById('expiry').value : null
 const expires_at = expiryVal ? new Date(expiryVal).toISOString() : null

 const btn = this.querySelector('button[type="submit"]')
 const originalText = btn.textContent
 btn.disabled = true
 btn.textContent = 'Submitting...'

 // Handle image upload
 let image = document.getElementById("imageUrl").value
 const imageFile = document.getElementById("imageFile").files[0]
 if (imageFile) {
   try {
     const fileExt = imageFile.name.split('.').pop()
     const fileName = `${currentUser.id}_${Date.now()}.${fileExt}`
     const { error: uploadError } = await db.storage.from('service-images').upload(fileName, imageFile)
     if (!uploadError) {
       const { data: { publicUrl } } = db.storage.from('service-images').getPublicUrl(fileName)
       image = publicUrl
     }
   } catch (err) { console.error('Image upload error:', err) }
 }
 if (!image) image = "https://via.placeholder.com/220x120"

 // Collect variants (offered only)
 const variants = []
 if (!isNeeded) {
   document.querySelectorAll('#variantsList > div').forEach(row => {
     const name = row.querySelector('.variant-name')?.value.trim()
     const priceVal = parseFloat(row.querySelector('.variant-price')?.value)
     if (name && !isNaN(priceVal)) variants.push({ name, price: priceVal })
   })
 }

 const serviceData = {
   vendor_id: currentUser.id,
   title, description: desc, price: finalPrice,
   price_min: priceMin, price_max: priceMax, pricing_mode: _pricingMode,
   category, location, time, contact, whatsapp, telegram, image,
   type, status: 'pending',
   variants: variants.length > 0 ? variants : [],
   urgency, expires_at
 }

 const { error } = await db.from('services').insert(serviceData)
 btn.disabled = false
 btn.textContent = originalText

 if (error) {
   console.error('Submit error:', error)
   alert('Error submitting: ' + error.message)
   return
 }

 alert('Submitted! Waiting for admin approval.')
 this.reset()
 if (isNeeded) window.location.href = 'needed.html'
 else window.location.href = 'find.html'
 })
 </script>

</body>

</html>
