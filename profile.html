<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile — iTa'awun</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green:       #1D9E75;
    --green-light: #e8f7f2;
    --green-dark:  #15785a;
    --gray-50:     #f9fafb;
    --gray-100:    #f3f4f6;
    --gray-200:    #e5e7eb;
    --gray-400:    #9ca3af;
    --gray-500:    #6b7280;
    --gray-600:    #4b5563;
    --gray-900:    #111827;
    --red:         #ef4444;
    --radius:      12px;
    --shadow:      0 1px 3px rgba(0,0,0,.08);
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--gray-50); color: var(--gray-900); min-height: 100vh; padding-bottom: 80px; }

  /* ── HEADER ── */
  .header { background: #fff; border-bottom: 1px solid var(--gray-200); padding: 0 1rem; height: 52px; display: flex; align-items: center; gap: .75rem; position: sticky; top: 0; z-index: 100; }
  .back-btn { color: var(--gray-600); text-decoration: none; font-size: .9rem; flex-shrink: 0; }
  .header-title { font-size: 1rem; font-weight: 700; flex: 1; }

  /* ── PROFILE HERO ── */
  .profile-hero {
    background: linear-gradient(135deg, #1D9E75 0%, #15785a 100%);
    padding: 1.75rem 1rem 2.25rem;
    text-align: center; color: #fff;
  }
  .avatar-wrap { position: relative; display: inline-block; margin-bottom: .85rem; }
  .avatar {
    width: 72px; height: 72px; border-radius: 50%;
    background: rgba(255,255,255,.2); border: 3px solid rgba(255,255,255,.5);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.6rem; font-weight: 700; color: #fff;
    overflow: hidden; margin: 0 auto;
  }
  .avatar img { width: 100%; height: 100%; object-fit: cover; }
  .avatar-edit-btn {
    position: absolute; bottom: 0; right: 0;
    width: 24px; height: 24px; border-radius: 50%;
    background: #fff; color: var(--green); font-size: .75rem;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; border: none; box-shadow: var(--shadow);
  }
  .profile-name  { font-size: 1.15rem; font-weight: 700; margin-bottom: .3rem; }
  .profile-email { font-size: .82rem; opacity: .8; margin-bottom: .6rem; }
  .role-badge {
    display: inline-flex; align-items: center; gap: .3rem;
    background: rgba(255,255,255,.2); border: 1px solid rgba(255,255,255,.35);
    border-radius: 100px; padding: .25rem .75rem;
    font-size: .75rem; font-weight: 600; letter-spacing: .02em;
  }

  /* ── STATS ROW ── */
  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); background: #fff; border-bottom: 1px solid var(--gray-100); }
  .stat-cell { padding: .85rem .5rem; text-align: center; border-right: 1px solid var(--gray-100); }
  .stat-cell:last-child { border-right: none; }
  .stat-num   { font-size: 1.2rem; font-weight: 800; color: var(--green); margin-bottom: .15rem; }
  .stat-label { font-size: .7rem; color: var(--gray-400); font-weight: 500; text-transform: uppercase; letter-spacing: .04em; }

  /* ── TRUST SCORE ── */
  .trust-card { background: #fff; border-bottom: 1px solid var(--gray-100); padding: .9rem 1rem; }
  .trust-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: .55rem; }
  .trust-label { font-size: .78rem; font-weight: 600; color: var(--gray-600); text-transform: uppercase; letter-spacing: .05em; }
  .trust-val   { font-size: .95rem; font-weight: 700; color: var(--green); }
  .trust-bar   { height: 6px; background: var(--gray-100); border-radius: 3px; overflow: hidden; }
  .trust-fill  { height: 100%; background: linear-gradient(to right, #1D9E75, #10b981); border-radius: 3px; transition: width .6s ease; }
  .trust-sub   { font-size: .75rem; color: var(--gray-400); margin-top: .4rem; }

  /* ── VERIFICATION ── */
  .verify-card { background: #fff; border-bottom: 1px solid var(--gray-100); padding: .9rem 1rem; display: flex; align-items: center; gap: .75rem; }
  .verify-icon  { font-size: 1.4rem; flex-shrink: 0; }
  .verify-info  { flex: 1; min-width: 0; }
  .verify-title { font-size: .875rem; font-weight: 600; }
  .verify-sub   { font-size: .75rem; color: var(--gray-400); margin-top: .1rem; }
  .verify-chip  { flex-shrink: 0; display: inline-flex; align-items: center; gap: .25rem; font-size: .72rem; font-weight: 600; padding: .2rem .55rem; border-radius: 100px; }
  .chip-verified   { background: var(--green-light); color: var(--green-dark); }
  .chip-pending    { background: #fef3c7; color: #92400e; }
  .verify-upload-btn { flex-shrink: 0; font-size: .8rem; color: var(--green); font-weight: 500; cursor: pointer; background: none; border: none; font-family: inherit; }

  /* ── LIST SECTIONS ── */
  .section-head { font-size: .72rem; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--gray-400); padding: .9rem 1rem .4rem; }
  .list-card    { background: #fff; border-top: 1px solid var(--gray-100); border-bottom: 1px solid var(--gray-100); }
  .list-item {
    display: flex; align-items: center; gap: .75rem;
    padding: .85rem 1rem; border-bottom: 1px solid var(--gray-50);
    cursor: pointer; text-decoration: none; color: inherit;
    transition: background .1s;
  }
  .list-item:last-child { border-bottom: none; }
  .list-item:hover { background: var(--gray-50); }
  .item-icon  { width: 36px; height: 36px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0; }
  .item-info  { flex: 1; min-width: 0; }
  .item-title { font-size: .875rem; font-weight: 500; }
  .item-sub   { font-size: .75rem; color: var(--gray-400); margin-top: .1rem; }
  .item-arrow { color: var(--gray-300); font-size: 1.1rem; }

  /* ── EDIT NAME SHEET ── */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 200; }
  .overlay.open { display: block; }
  .sheet {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: #fff; border-radius: 20px 20px 0 0;
    padding: 1.25rem 1rem 2.5rem; z-index: 201;
    transform: translateY(100%); transition: transform .3s cubic-bezier(.4,0,.2,1);
  }
  .sheet.open { transform: translateY(0); }
  .sheet-handle { width: 36px; height: 4px; background: var(--gray-200); border-radius: 2px; margin: 0 auto 1.1rem; }
  .sheet-title  { font-size: 1rem; font-weight: 700; margin-bottom: 1rem; }
  .field label  { display: block; font-size: .78rem; font-weight: 500; color: var(--gray-600); text-transform: uppercase; letter-spacing: .04em; margin-bottom: .4rem; }
  .field input  { width: 100%; border: 1.5px solid var(--gray-200); border-radius: 10px; padding: .75rem .9rem; font-size: .95rem; font-family: inherit; outline: none; transition: border-color .15s; margin-bottom: 1rem; }
  .field input:focus { border-color: var(--green); }
  .btn-save { width: 100%; padding: .8rem; background: var(--green); color: #fff; border: none; border-radius: 10px; font-size: .95rem; font-weight: 600; cursor: pointer; font-family: inherit; transition: opacity .15s; }
  .btn-save:hover { opacity: .9; }
  .btn-save:disabled { opacity: .5; cursor: default; }

  /* ── SKELETON ── */
  .skeleton { background: linear-gradient(90deg, var(--gray-100) 25%, var(--gray-200) 50%, var(--gray-100) 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 8px; }
  @keyframes shimmer { to { background-position: -200% 0; } }

  /* ── BOTTOM NAV ── */
  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid var(--gray-200); display: flex; height: 60px; z-index: 100; }
  .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; text-decoration: none; color: var(--gray-400); font-size: .65rem; font-weight: 500; transition: color .15s; }
  .nav-item.active { color: var(--green); }
  .nav-icon { font-size: 1.2rem; line-height: 1; }

  #toast { display: none; position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%); background: var(--gray-900); color: #fff; padding: .65rem 1.25rem; border-radius: 8px; font-size: .85rem; z-index: 999; max-width: 88vw; text-align: center; }
</style>
</head>
<body>

<header class="header">
  <a class="back-btn" href="home.html">&#8592;</a>
  <div class="header-title">Profile</div>
</header>

<div id="hero-skeleton" style="background:linear-gradient(135deg,#1D9E75,#15785a);padding:1.75rem 1rem 2.25rem;text-align:center">
  <div class="skeleton" style="width:72px;height:72px;border-radius:50%;margin:0 auto .85rem;opacity:.35"></div>
  <div class="skeleton" style="height:18px;width:140px;margin:0 auto .4rem;opacity:.35"></div>
  <div class="skeleton" style="height:12px;width:100px;margin:0 auto;opacity:.25"></div>
</div>

<div id="page-content" style="display:none">

  <div class="profile-hero">
    <div class="avatar-wrap">
      <div class="avatar" id="avatar-el">?</div>
      <button class="avatar-edit-btn" onclick="document.getElementById('avatar-file').click()" title="Change photo">✎</button>
      <input type="file" id="avatar-file" style="display:none" accept="image/jpeg,image/png" onchange="uploadAvatar(this)">
    </div>
    <div class="profile-name" id="profile-name">—</div>
    <div class="profile-email" id="profile-email"></div>
    <div class="role-badge" id="role-badge"></div>
  </div>

  <div class="stats-row">
    <div class="stat-cell"><div class="stat-num" id="stat-orders">—</div><div class="stat-label">Orders</div></div>
    <div class="stat-cell"><div class="stat-num" id="stat-reviews">—</div><div class="stat-label">Reviews</div></div>
    <div class="stat-cell"><div class="stat-num" id="stat-score">—</div><div class="stat-label">Trust Score</div></div>
  </div>

  <div class="trust-card">
    <div class="trust-header">
      <span class="trust-label">Trust Score</span>
      <span class="trust-val" id="trust-val">—</span>
    </div>
    <div class="trust-bar"><div class="trust-fill" id="trust-fill" style="width:0%"></div></div>
    <div class="trust-sub" id="trust-sub"></div>
  </div>

  <div class="verify-card" id="verify-card"></div>

  <div class="section-head">Account</div>
  <div class="list-card">
    <div class="list-item" onclick="openEditName()">
      <div class="item-icon" style="background:#e8f7f2">✏️</div>
      <div class="item-info">
        <div class="item-title">Edit Name</div>
        <div class="item-sub" id="name-sub">—</div>
      </div>
      <span class="item-arrow">›</span>
    </div>
    <a class="list-item" href="orders.html">
      <div class="item-icon" style="background:#eff6ff">📋</div>
      <div class="item-info"><div class="item-title">My Orders</div><div class="item-sub">View all your orders</div></div>
      <span class="item-arrow">›</span>
    </a>
  </div>

  <div id="role-actions"></div>

  <div class="section-head">Session</div>
  <div class="list-card">
    <div class="list-item" onclick="logout()" style="color:var(--red)">
      <div class="item-icon" style="background:#fee2e2">🚪</div>
      <div class="item-info"><div class="item-title" style="color:var(--red)">Log Out</div></div>
    </div>
  </div>

  <div style="height:.5rem"></div>
</div>

<div class="overlay" id="overlay" onclick="closeSheet()"></div>
<div class="sheet" id="edit-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">Edit Name</div>
  <div class="field">
    <label>Full name</label>
    <input type="text" id="name-input" placeholder="e.g. Ahmad bin Abdullah" maxlength="100" autocomplete="name">
  </div>
  <button class="btn-save" id="save-btn" onclick="saveName()">Save</button>
</div>

<nav class="bottom-nav">
  <a class="nav-item" href="home.html"><span class="nav-icon">🏠</span>Home</a>
  <a class="nav-item" href="vendors.html"><span class="nav-icon">🏪</span>Vendors</a>
  <a class="nav-item" href="orders.html"><span class="nav-icon">📋</span>Orders</a>
  <a class="nav-item active" href="profile.html"><span class="nav-icon">👤</span>Profile</a>
</nav>

<div id="toast"></div>

<script>
const ROLE_CONFIG = {
  member: { label: 'Member', emoji: '🙋' },
  tasker: { label: 'Tasker', emoji: '⚡' },
  vendor: { label: 'Vendor', emoji: '🏪' },
  asnaf:  { label: 'Asnaf',  emoji: '🤝' },
  admin:  { label: 'Admin',  emoji: '🛡️' }
}

let currentSession = null
let profile        = null

async function init() {
  currentSession = await requireAuth()
  if (!currentSession) return

  const uid = currentSession.user.id
  const [userRes, ordersRes, reviewsRes] = await Promise.all([
    db.from('users').select('id, full_name, role, trust_score, matric_card_url, avatar_url').eq('id', uid).single(),
    db.from('orders').select('id', { count: 'exact', head: true }).eq('buyer_id', uid),
    db.from('reviews').select('id', { count: 'exact', head: true }).eq('reviewer_id', uid)
  ])

  profile = userRes.data || {}
  renderPage(ordersRes.count || 0, reviewsRes.count || 0)
}

function renderPage(orderCount, reviewCount) {
  document.getElementById('hero-skeleton').style.display = 'none'
  document.getElementById('page-content').style.display  = 'block'

  const name  = profile.full_name || 'User'
  const email = currentSession.user.email || ''
  const role  = profile.role || 'member'
  const score = profile.trust_score ?? 0
  const rc    = ROLE_CONFIG[role] || ROLE_CONFIG.member

  // Avatar
  const avatarEl = document.getElementById('avatar-el')
  if (profile.avatar_url) {
    const { data } = db.storage.from('avatars').getPublicUrl(profile.avatar_url)
    avatarEl.innerHTML = `<img src="${data.publicUrl}" alt="${name}">`
  } else {
    avatarEl.textContent = name.charAt(0).toUpperCase()
  }

  document.getElementById('profile-name').textContent  = name
  document.getElementById('profile-email').textContent = email
  document.getElementById('role-badge').innerHTML      = `${rc.emoji} ${rc.label}`
  document.getElementById('name-sub').textContent      = name

  // Stats
  document.getElementById('stat-orders').textContent  = orderCount
  document.getElementById('stat-reviews').textContent = reviewCount
  document.getElementById('stat-score').textContent   = score

  // Trust bar
  const pct = Math.min(100, Math.max(0, score))
  document.getElementById('trust-val').textContent  = score + ' / 100'
  document.getElementById('trust-fill').style.width = pct + '%'
  document.getElementById('trust-sub').textContent  =
    score >= 80 ? 'Excellent reputation — vendors trust you.' :
    score >= 50 ? 'Good standing. Keep completing orders on time.' :
                  'Complete orders and leave reviews to grow your score.'

  // Verification card
  const vEl = document.getElementById('verify-card')
  if (profile.matric_card_url) {
    vEl.innerHTML = `
      <div class="verify-icon">🎓</div>
      <div class="verify-info">
        <div class="verify-title">Student Verification</div>
        <div class="verify-sub">Matric card submitted — under review</div>
      </div>
      <span class="verify-chip chip-pending">⏳ Pending</span>`
  } else {
    vEl.innerHTML = `
      <div class="verify-icon">🪪</div>
      <div class="verify-info">
        <div class="verify-title">Student Verification</div>
        <div class="verify-sub">Upload your matric card to get the Verified badge</div>
      </div>
      <button class="verify-upload-btn" onclick="document.getElementById('matric-file').click()">Upload →</button>
      <input type="file" id="matric-file" style="display:none" accept="image/jpeg,image/png" onchange="uploadMatric(this)">`
  }

  renderRoleActions(role)
}

function renderRoleActions(role) {
  const el = document.getElementById('role-actions')
  let html = ''

  const canOpenShop  = ['member', 'tasker', 'asnaf'].includes(role)
  const canBeTasker  = role === 'member'
  const canApplyAsnaf = ['member', 'tasker'].includes(role)
  const isVendor     = ['vendor', 'admin'].includes(role)

  if (canBeTasker || canOpenShop || canApplyAsnaf) {
    html += '<div class="section-head">Grow on iTa\'awun</div><div class="list-card">'
    if (canBeTasker) {
      html += `<a class="list-item" href="tasker-apply.html">
        <div class="item-icon" style="background:#f5f3ff">⚡</div>
        <div class="item-info"><div class="item-title">Become a Tasker</div><div class="item-sub">Accept service requests from students</div></div>
        <span class="item-arrow">›</span></a>`
    }
    if (canOpenShop) {
      html += `<a class="list-item" href="vendor-apply.html">
        <div class="item-icon" style="background:var(--green-light)">🏪</div>
        <div class="item-info"><div class="item-title">Open a Shop</div><div class="item-sub">List products and services for sale</div></div>
        <span class="item-arrow">›</span></a>`
    }
    if (canApplyAsnaf) {
      html += `<a class="list-item" href="asnaf-apply.html">
        <div class="item-icon" style="background:#eff6ff">🤝</div>
        <div class="item-info"><div class="item-title">Apply for Asnaf Support</div><div class="item-sub">Low-income students can apply for reduced fees</div></div>
        <span class="item-arrow">›</span></a>`
    }
    html += '</div>'
  }

  if (isVendor) {
    html += '<div class="section-head">Your Shop</div><div class="list-card">'
    html += `<a class="list-item" href="vendor-dashboard.html">
      <div class="item-icon" style="background:var(--green-light)">📊</div>
      <div class="item-info"><div class="item-title">Vendor Dashboard</div><div class="item-sub">Manage orders, listings and revenue</div></div>
      <span class="item-arrow">›</span></a>`
    html += '</div>'
  }

  if (role === 'admin') {
    html += '<div class="section-head">Administration</div><div class="list-card">'
    html += `<a class="list-item" href="admin.html">
      <div class="item-icon" style="background:#fee2e2">🛡️</div>
      <div class="item-info"><div class="item-title">Admin Panel</div><div class="item-sub">Manage users, vendors and platform settings</div></div>
      <span class="item-arrow">›</span></a>`
    html += '</div>'
  }

  el.innerHTML = html
}

// ── EDIT NAME ────────────────────────────────────────────────
function openEditName() {
  document.getElementById('name-input').value = profile.full_name || ''
  document.getElementById('overlay').classList.add('open')
  document.getElementById('edit-sheet').classList.add('open')
  document.body.style.overflow = 'hidden'
  setTimeout(() => document.getElementById('name-input').focus(), 350)
}

function closeSheet() {
  document.getElementById('overlay').classList.remove('open')
  document.getElementById('edit-sheet').classList.remove('open')
  document.body.style.overflow = ''
}

async function saveName() {
  const val = document.getElementById('name-input').value.trim()
  if (!val) { showToast('Please enter your name.'); return }

  const btn = document.getElementById('save-btn')
  btn.disabled = true; btn.textContent = 'Saving…'

  const { error } = await db.from('users').update({ full_name: val }).eq('id', currentSession.user.id)
  if (error) { btn.disabled = false; btn.textContent = 'Save'; showToast('Failed to save.'); return }

  profile.full_name = val
  document.getElementById('profile-name').textContent = val
  document.getElementById('name-sub').textContent     = val
  closeSheet()
  btn.disabled = false; btn.textContent = 'Save'
  showToast('Name updated!')
}

// ── AVATAR UPLOAD ────────────────────────────────────────────
async function uploadAvatar(input) {
  const file = input.files[0]
  if (!file) return
  if (file.size > 2 * 1024 * 1024) { showToast('Image must be under 2 MB.'); return }

  showToast('Uploading…')
  const ext  = file.name.split('.').pop()
  const path = currentSession.user.id + '/avatar.' + ext
  const { error } = await db.storage.from('avatars').upload(path, file, { upsert: true })
  if (error) { showToast('Upload failed.'); return }

  await db.from('users').update({ avatar_url: path }).eq('id', currentSession.user.id)
  profile.avatar_url = path
  const { data } = db.storage.from('avatars').getPublicUrl(path)
  document.getElementById('avatar-el').innerHTML = `<img src="${data.publicUrl}?t=${Date.now()}" alt="Avatar">`
  showToast('Photo updated!')
}

// ── MATRIC UPLOAD ────────────────────────────────────────────
async function uploadMatric(input) {
  const file = input.files[0]
  if (!file) return
  if (file.size > 5 * 1024 * 1024) { showToast('Image must be under 5 MB.'); return }

  showToast('Uploading matric card…')
  const ext  = file.name.split('.').pop()
  const path = currentSession.user.id + '/matric.' + ext
  const { error: upErr } = await db.storage.from('matric-cards').upload(path, file, { upsert: true })
  if (upErr) { showToast('Upload failed.'); return }

  await db.from('users').update({ matric_card_url: path }).eq('id', currentSession.user.id)
  profile.matric_card_url = path
  document.getElementById('verify-card').innerHTML = `
    <div class="verify-icon">🎓</div>
    <div class="verify-info">
      <div class="verify-title">Student Verification</div>
      <div class="verify-sub">Matric card submitted — under review</div>
    </div>
    <span class="verify-chip chip-pending">⏳ Pending</span>`
  showToast('Matric card uploaded!')
}

// ── LOGOUT ───────────────────────────────────────────────────
async function logout() {
  if (!confirm('Log out of iTa\'awun?')) return
  await db.auth.signOut()
  window.location.href = 'index.html'
}

init()
</script>
</body>
</html>
