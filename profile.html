<!DOCTYPE html>
<html lang="en">

<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>My Profile - iTa'awun</title>
 <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
 <style>
 .back-button {
 padding: 10px 40px;
 display: flex;
 align-items: center;
 cursor: pointer;
 font-weight: bold;
 color: #001f3f;
 font-size: 16px;
 }

 .back-button i {
 margin-right: 8px;
 }

 .back-button:hover {
 color: #004f80;
 }

 body {
 margin: 0;
 font-family: 'Segoe UI', sans-serif;
 min-height: 100vh;
 display: flex;
 flex-direction: column;
 background: linear-gradient(-45deg, #00008B, #ffffff, #3F00FF);
 background-size: 400% 400%;
 animation: gradientBG 15s ease infinite;
 }

 @keyframes gradientBG {
 0% {
 background-position: 0% 50%;
 }

 50% {
 background-position: 100% 50%;
 }

 100% {
 background-position: 0% 50%;
 }
 }


 header {
 background: rgba(0, 0, 0, 0.2);
 color: white;
 padding: 15px 40px;
 display: flex;
 justify-content: space-between;
 align-items: center;
 }

 header .logo {
 font-size: 22px;
 font-weight: bold;
 cursor: pointer;
 color: white;
 }

 .profile-card {
 background: rgba(255, 255, 255, 0.95);
 max-width: 600px;
 margin: 30px auto;
 padding: 30px;
 border-radius: 15px;
 box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
 }

 .profile-header {
 text-align: center;
 margin-bottom: 25px;
 }

 .profile-card img {
 width: 120px;
 height: 120px;
 border-radius: 50%;
 border: 3px solid #001f3f;
 margin-bottom: 15px;
 object-fit: cover;
 }

 .profile-card h2 {
 margin: 10px 0;
 color: #001f3f;
 }

 .role-badge {
 display: inline-block;
 padding: 3px 12px;
 border-radius: 20px;
 font-size: 12px;
 font-weight: bold;
 background: #f3e8ff;
 color: #6b21a8;
 margin-bottom: 10px;
 }

 .section-title {
 font-size: 16px;
 font-weight: bold;
 color: #001f3f;
 margin: 20px 0 10px;
 padding-bottom: 5px;
 border-bottom: 2px solid #6b21a8;
 }

 .info {
 margin-top: 15px;
 }

 .info-row {
 display: flex;
 justify-content: space-between;
 padding: 8px 0;
 border-bottom: 1px solid #eee;
 }

 .info-row:last-child {
 border-bottom: none;
 }

 .info-label {
 color: #666;
 font-size: 14px;
 }

 .info-value {
 color: #333;
 font-weight: 500;
 font-size: 14px;
 }

 .edit-btn {
 background: #6b21a8;
 color: white;
 border: none;
 padding: 8px 16px;
 border-radius: 6px;
 cursor: pointer;
 font-size: 13px;
 margin-top: 15px;
 transition: 0.2s;
 }

 .edit-btn:hover {
 background: #5b1a8a;
 }

 .edit-form {
 overflow: hidden;
 max-height: 0;
 opacity: 0;
 margin-top: 0;
 transition: max-height 0.4s ease, opacity 0.3s ease, margin-top 0.3s ease;
 }

 .edit-form.active {
 max-height: 800px;
 opacity: 1;
 margin-top: 15px;
 }

 .edit-form label {
 display: block;
 margin: 10px 0 5px;
 font-size: 13px;
 color: #555;
 }

 .edit-form input {
 width: 100%;
 padding: 10px;
 border: 1px solid #ddd;
 border-radius: 6px;
 font-size: 14px;
 box-sizing: border-box;
 }

 .edit-form .form-actions {
 display: flex;
 gap: 10px;
 margin-top: 15px;
 }

 .save-btn {
 flex: 1;
 background: #6b21a8;
 color: white;
 border: none;
 padding: 10px;
 border-radius: 6px;
 cursor: pointer;
 font-size: 14px;
 transition: 0.2s;
 }
 .save-btn:hover { background: #5b1a8a; }
 .save-btn:disabled { opacity: 0.6; cursor: not-allowed; }

 /* Toast notification */
 .toast {
 position: fixed;
 bottom: 30px;
 left: 50%;
 transform: translateX(-50%) translateY(20px);
 background: #1e1b4b;
 color: white;
 padding: 12px 24px;
 border-radius: 8px;
 font-size: 14px;
 font-weight: 500;
 opacity: 0;
 transition: opacity 0.3s ease, transform 0.3s ease;
 z-index: 9999;
 pointer-events: none;
 box-shadow: 0 4px 15px rgba(0,0,0,0.3);
 }
 .toast.show {
 opacity: 1;
 transform: translateX(-50%) translateY(0);
 }
 .toast.success { background: #166534; }
 .toast.error { background: #991b1b; }

 .cancel-btn {
 flex: 1;
 background: #666;
 color: white;
 border: none;
 padding: 10px;
 border-radius: 6px;
 cursor: pointer;
 font-size: 14px;
 }

 .logout-btn {
 margin-top: 25px;
 padding: 10px 20px;
 background: #dc2626;
 color: white;
 border: none;
 border-radius: 8px;
 font-size: 16px;
 cursor: pointer;
 transition: 0.3s;
 width: 100%;
 }

 .logout-btn:hover {
 background: #b91c1c;
 }

 footer {
 margin-top: auto;
 background: rgba(0, 0, 0, 0.2);
 color: white;
 text-align: center;
 padding: 15px;
 }

 @media (max-width: 600px) {
 .profile-card {
 margin: 20px;
 padding: 20px;
 }

 .profile-card img {
 width: 100px;
 height: 100px;
 }
 }
 </style>
</head>

<body>

 <header>
 <div class="logo" onclick="window.location.href='home.html'">iTa'awun</div>
 </header>

 <div class="back-button" onclick="window.location.href='home.html'">
 <i class="fa-solid fa-arrow-left"></i> Back
 </div>

 <div class="profile-card">
 <div class="profile-header">
 <img id="pfp" src="assets/images/ipey.jpeg" alt="Profile Picture">
 <br>
 <button id="uploadBtn" onclick="triggerFileUpload()" class="edit-btn">Change Photo</button>
 <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleFileSelect(event)">
 <div id="uploadStatus" style="margin-top:10px;font-size:13px;"></div>
 <h2 id="displayName">Loading...</h2>
 <span class="role-badge" id="roleBadge">student</span>
 </div>

 <div class="section-title">Profile Information</div>
 <div class="info">
 <div class="info-row">
 <span class="info-label">Email</span>
 <span class="info-value" id="userEmail">—</span>
 </div>
 <div class="info-row">
 <span class="info-label">Full Name</span>
 <span class="info-value" id="fullNameDisplay">—</span>
 </div>
 <div class="info-row">
 <span class="info-label">Student ID</span>
 <span class="info-value" id="studentId">—</span>
 </div>
 <div class="info-row">
 <span class="info-label">Phone</span>
 <span class="info-value" id="userPhone">—</span>
 </div>
 <div class="info-row">
 <span class="info-label">Room Address</span>
 <span class="info-value" id="roomAddress">—</span>
 </div>
 <div class="info-row">
 <span class="info-label">Gender</span>
 <span class="info-value" id="gender">—</span>
 </div>
 <div class="info-row">
 <span class="info-label">Member Since</span>
 <span class="info-value" id="memberSince">—</span>
 </div>
 </div>

 <button class="edit-btn" onclick="toggleEditForm()">Edit Profile</button>

 <div class="edit-form" id="editForm">
 <label>Full Name</label>
 <input type="text" id="editFullName">
 <label>Student ID</label>
 <input type="text" id="editStudentId">
 <label>Phone</label>
 <input type="text" id="editPhone">
 <label>Room Address</label>
 <input type="text" id="editRoomAddress" placeholder="Mahallah X, Block A, Level 1, Room 101">
 <label>New Password (leave blank to keep current)</label>
 <input type="password" id="editPassword" placeholder="Min 6 characters">
 <div class="form-actions">
 <button class="save-btn" onclick="saveProfile()">Save Changes</button>
 <button class="cancel-btn" onclick="toggleEditForm()">Cancel</button>
 </div>
 </div>

 <button class="logout-btn" onclick="doLogout()">Logout</button>
 </div>

 <footer>
 <p>© 2025 iTa'awun | Student Freelance Collaboration</p>
 </footer>
 <div class="toast" id="toast"></div>

 <script>
 const SUPABASE_URL = 'https://fyahebgkacjsxmiwteny.supabase.co'
 const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ5YWhlYmdrYWNqc3htaXd0ZW55Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAyNTg3NDEsImV4cCI6MjA4NTgzNDc0MX0.eIAWIPzB6EjW7rPKHLSsc2ryUBQ7yicRK1I-SxXg_2Y'
 const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

 let currentUser = null

 function showToast(msg, type = 'success') {
 const t = document.getElementById('toast')
 t.textContent = msg
 t.className = 'toast ' + type + ' show'
 setTimeout(() => { t.className = 'toast ' + type }, 3000)
 }

 // Protect page
 (async function initProfile() {
 try {
 const { data: { session } } = await db.auth.getSession()
 if (!session) { window.location.href = 'index.html'; return }

 currentUser = session.user
 document.getElementById('userEmail').textContent = session.user.email

 const { data: profile, error } = await db
 .from('profiles')
 .select('*')
 .eq('id', session.user.id)
 .single()

 if (error) throw error

 if (profile) {
 document.getElementById('displayName').textContent = profile.full_name || session.user.email
 document.getElementById('fullNameDisplay').textContent = profile.full_name || '—'
 document.getElementById('studentId').textContent = profile.student_id || '—'
 document.getElementById('userPhone').textContent = profile.phone || '—'
 document.getElementById('roomAddress').textContent = profile.room_address || '—'
 document.getElementById('gender').textContent = profile.gender
 ? profile.gender.charAt(0).toUpperCase() + profile.gender.slice(1)
 : '—'
 document.getElementById('roleBadge').textContent = profile.role || 'student'
 if (profile.created_at) {
 const date = new Date(profile.created_at)
 document.getElementById('memberSince').textContent = date.toLocaleDateString('en-US', { month: 'short', year: 'numeric' })
 }
 if (profile.avatar_url) document.getElementById('pfp').src = profile.avatar_url
 document.getElementById('editFullName').value = profile.full_name || ''
 document.getElementById('editStudentId').value = profile.student_id || ''
 document.getElementById('editPhone').value = profile.phone || ''
 document.getElementById('editRoomAddress').value = profile.room_address || ''
 } else {
 document.getElementById('displayName').textContent = session.user.email
 }
 } catch (err) {
 console.error('initProfile error:', err)
 document.getElementById('displayName').textContent = 'Error loading profile'
 }
 })()

 async function doLogout() {
 await db.auth.signOut()
 window.location.replace('index.html?logged=out')
 }

 function toggleEditForm() {
 document.getElementById('editForm').classList.toggle('active')
 }

 async function saveProfile() {
 const fullName = document.getElementById('editFullName').value.trim()
 const studentId = document.getElementById('editStudentId').value.trim()
 const phone = document.getElementById('editPhone').value.trim()
 const roomAddress = document.getElementById('editRoomAddress').value.trim()
 const newPassword = document.getElementById('editPassword').value

 if (!fullName || !studentId) {
 showToast('Full Name and Student ID are required.', 'error'); return
 }
 if (newPassword && newPassword.length < 6) {
 showToast('Password must be at least 6 characters.', 'error'); return
 }

 const btn = document.querySelector('.save-btn')
 btn.disabled = true
 btn.textContent = 'Saving...'

 if (newPassword) {
 const { error: pwError } = await db.auth.updateUser({ password: newPassword })
 if (pwError) {
 showToast('Password error: ' + pwError.message, 'error')
 btn.disabled = false; btn.textContent = 'Save Changes'; return
 }
 }

 const { error } = await db.from('profiles').update({
 full_name: fullName, student_id: studentId, phone, room_address: roomAddress
 }).eq('id', currentUser.id)

 btn.disabled = false
 btn.textContent = 'Save Changes'

 if (error) { showToast('Error: ' + error.message, 'error'); return }

 showToast('Profile updated!', 'success')
 document.getElementById('displayName').textContent = fullName
 document.getElementById('fullNameDisplay').textContent = fullName
 document.getElementById('studentId').textContent = studentId
 document.getElementById('userPhone').textContent = phone || '—'
 document.getElementById('roomAddress').textContent = roomAddress || '—'
 document.getElementById('editPassword').value = ''
 toggleEditForm()
 }

 function triggerFileUpload() {
 if (!currentUser) { showToast('Session not ready. Please refresh.', 'error'); return }
 document.getElementById('fileInput').click()
 }

 async function handleFileSelect(event) {
 const file = event.target.files[0]
 if (!file) return
 if (!currentUser) { showToast('Session not ready. Please refresh.', 'error'); return }

 const statusEl = document.getElementById('uploadStatus')
 const btn = document.getElementById('uploadBtn')
 statusEl.textContent = 'Uploading...'
 statusEl.style.color = '#6b21a8'
 btn.disabled = true

 if (file.size > 2 * 1024 * 1024) {
 statusEl.textContent = 'File too large. Max 2MB.'
 statusEl.style.color = '#dc2626'
 btn.disabled = false; return
 }
 if (!file.type.startsWith('image/')) {
 statusEl.textContent = 'Please select an image file.'
 statusEl.style.color = '#dc2626'
 btn.disabled = false; return
 }

 try {
 const fileExt = file.name.split('.').pop()
 const fileName = `${currentUser.id}.${fileExt}`
 const { error: uploadError } = await db.storage
 .from('avatars').upload(fileName, file, { upsert: true })
 if (uploadError) throw uploadError

 const { data: { publicUrl } } = db.storage.from('avatars').getPublicUrl(fileName)

 const { error: updateError } = await db.from('profiles')
 .update({ avatar_url: publicUrl }).eq('id', currentUser.id)
 if (updateError) throw updateError

 document.getElementById('pfp').src = publicUrl + '?t=' + Date.now()
 statusEl.textContent = ''
 btn.disabled = false
 showToast('Profile photo updated!', 'success')
 } catch (err) {
 console.error('Upload error:', err)
 statusEl.textContent = 'Upload failed: ' + err.message
 statusEl.style.color = '#dc2626'
 btn.disabled = false
 }
 }
 </script>
</body>

</html>
