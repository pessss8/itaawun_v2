<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iTa'awun - Reset Password</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, rgba(0, 31, 63, 0.85), #6A5ACD),
        url('assets/images/bi1.png') no-repeat center center / cover;
    }

    .container {
      background: #fff;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.25);
      width: 360px;
      text-align: center;
    }

    .logo {
      font-size: 28px;
      font-weight: bold;
      color: #001f3f;
      margin-bottom: 6px;
    }

    .tagline {
      font-size: 14px;
      color: #666;
      margin-bottom: 20px;
    }

    h2 {
      margin-bottom: 8px;
      color: #001f3f;
    }

    .sub {
      font-size: 13px;
      color: #666;
      margin-bottom: 20px;
    }

    input {
      width: 90%;
      padding: 12px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #001f3f;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      transition: 0.3s;
      margin-top: 8px;
    }

    button:hover {
      background: #003366;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    #msg {
      min-height: 20px;
      font-size: 13px;
      margin: 8px 0;
      padding: 6px 10px;
      border-radius: 6px;
    }

    #msg.error {
      background: #fef2f2;
      color: #dc2626;
    }

    #msg.success {
      background: #f0fdf4;
      color: #16a34a;
    }

    .links {
      margin-top: 15px;
      font-size: 14px;
    }

    .links a {
      color: #6b21a8;
      text-decoration: none;
    }

    .links a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="logo">iTa'awun</div>
    <div class="tagline">Student Freelance Collaboration</div>
    <h2>Reset Password</h2>
    <p class="sub">Enter your student email. We'll send you a reset link.</p>

    <div id="msg"></div>
    <input id="email" type="email" placeholder="Your student email">
    <button id="btn-reset" onclick="doReset()">Send Reset Link</button>

    <div class="links">
      <p><a href="index.html">← Back to Login</a></p>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://fyahebgkacjsxmiwteny.supabase.co'
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ5YWhlYmdrYWNqc3htaXd0ZW55Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAyNTg3NDEsImV4cCI6MjA4NTgzNDc0MX0.eIAWIPzB6EjW7rPKHLSsc2ryUBQ7yicRK1I-SxXg_2Y'
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

    function setMsg(text, type = 'error') {
      const el = document.getElementById('msg')
      el.textContent = text
      el.className = type
    }

    async function doReset() {
      const email = document.getElementById('email').value.trim()
      if (!email) { setMsg('Please enter your email.'); return }

      document.getElementById('btn-reset').disabled = true
      setMsg('Sending reset link...', 'success')

      const { error } = await db.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + '/index.html'
      })

      document.getElementById('btn-reset').disabled = false
      if (error) { setMsg(error.message); return }
      setMsg('Reset link sent! Check your email inbox (and spam folder).', 'success')
    }
  </script>
</body>

</html>
