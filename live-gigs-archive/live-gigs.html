<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Gigs - iTa'awun</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: linear-gradient(-45deg, #00008B, #ffffff, #3F00FF);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      color: #333;
    }

    @keyframes gradientBG {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    header {
      background: rgba(0, 0, 0, 0.2);
      color: white;
      padding: 15px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header .logo {
      font-size: 22px;
      font-weight: bold;
      cursor: pointer;
      color: white;
    }

    .profile-container {
      position: relative;
    }

    .profile-pic {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid white;
      transition: transform 0.2s;
    }

    .profile-container:hover .profile-pic {
      transform: scale(1.1);
    }

    .dropdown {
      display: none;
      position: absolute;
      right: 0;
      top: 50px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      z-index: 100;
      min-width: 150px;
    }

    .profile-container:hover .dropdown {
      display: block;
    }

    .dropdown a {
      display: block;
      padding: 10px 15px;
      text-decoration: none;
      color: #333;
      font-size: 14px;
    }

    .dropdown a:hover {
      background: #f5f0ff;
      color: #6b21a8;
    }

    .back-button {
      padding: 10px 40px;
      display: flex;
      align-items: center;
      cursor: pointer;
      font-weight: bold;
      color: #001f3f;
      font-size: 16px;
    }

    .back-button i {
      margin-right: 8px;
    }

    .back-button:hover {
      color: #004f80;
    }

    .page-header {
      text-align: center;
      padding: 20px;
      color: #001f3f;
    }

    .page-header h1 {
      margin: 0 0 8px 0;
      font-size: 28px;
    }

    .page-header p {
      margin: 0;
      color: #555;
      font-size: 14px;
    }

    .action-bar {
      display: flex;
      justify-content: center;
      gap: 15px;
      padding: 15px;
      flex-wrap: wrap;
    }

    .btn-primary {
      padding: 12px 24px;
      background: #001f3f;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: 0.2s;
    }

    .btn-primary:hover {
      background: #004f80;
    }

    .btn-secondary {
      padding: 12px 24px;
      background: #6b21a8;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: 0.2s;
    }

    .btn-secondary:hover {
      background: #581c87;
    }

    .tasker-badge {
      background: #fbbf24;
      color: #78350f;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
      display: inline-block;
    }

    .filters-bar {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 15px;
      flex-wrap: wrap;
    }

    .filters-bar select,
    .filters-bar input {
      padding: 10px 14px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
      background: white;
    }

    .gigs-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
      padding: 20px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .gig-card {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
      overflow: hidden;
      transition: transform 0.3s;
      display: flex;
      flex-direction: column;
    }

    .gig-card:hover {
      transform: scale(1.02);
    }

    .gig-header {
      padding: 15px;
      border-bottom: 1px solid #eee;
    }

    .gig-title {
      font-size: 16px;
      font-weight: bold;
      color: #001f3f;
      margin: 0 0 8px 0;
    }

    .gig-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      color: #666;
    }

    .gig-reward {
      font-size: 18px;
      font-weight: bold;
      color: #16a34a;
    }

    .gig-body {
      padding: 15px;
      flex: 1;
    }

    .gig-desc {
      font-size: 14px;
      color: #555;
      margin: 0 0 12px 0;
      line-height: 1.5;
    }

    .gig-location {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #666;
      margin-bottom: 8px;
    }

    .gig-time {
      font-size: 12px;
      color: #999;
    }

    .requester-info {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 15px;
      border-top: 1px solid #eee;
      background: #f9fafb;
    }

    .requester-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #001f3f;
    }

    .requester-name {
      font-size: 13px;
      font-weight: 600;
      color: #001f3f;
    }

    .gig-footer {
      padding: 12px 15px;
      display: flex;
      gap: 10px;
    }

    .btn-grab {
      flex: 1;
      padding: 10px;
      background: #001f3f;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn-grab:hover {
      background: #004f80;
    }

    .btn-grab:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-flag {
      padding: 10px;
      background: #fee2e2;
      color: #991b1b;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn-flag:hover {
      background: #fecaca;
    }

    .status-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: bold;
    }

    .status-live {
      background: #dcfce7;
      color: #166534;
    }

    .status-grabbed {
      background: #fef9c3;
      color: #854d0e;
    }

    .status-completed {
      background: #dbeafe;
      color: #1e40af;
    }

    .status-flagged {
      background: #fee2e2;
      color: #991b1b;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #001f3f;
    }

    .empty-state i {
      font-size: 48px;
      color: #ccc;
      margin-bottom: 15px;
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
    }

    .modal-content {
      background: white;
      max-width: 500px;
      margin: 50px auto;
      padding: 25px;
      border-radius: 12px;
      position: relative;
    }

    .modal-close {
      position: absolute;
      top: 15px;
      right: 15px;
      font-size: 24px;
      cursor: pointer;
      color: #999;
    }

    .modal-close:hover {
      color: #333;
    }

    .modal-title {
      font-size: 20px;
      font-weight: bold;
      color: #001f3f;
      margin-bottom: 15px;
    }

    .modal-body {
      font-size: 14px;
      color: #555;
      line-height: 1.6;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .btn-confirm {
      flex: 1;
      padding: 12px;
      background: #001f3f;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
    }

    .btn-cancel {
      flex: 1;
      padding: 12px;
      background: #e5e7eb;
      color: #333;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
    }

    footer {
      background: rgba(0, 0, 0, 0.2);
      color: white;
      text-align: center;
      padding: 15px;
      margin-top: auto;
    }

    @media (max-width: 600px) {
      .gigs-container {
        grid-template-columns: 1fr;
      }

      header {
        padding: 15px 20px;
      }
    }
  </style>
</head>

<body>

  <header>
    <div class="logo" onclick="window.location.href='home.html'">IT'aawun</div>
    <div class="profile-container">
      <img src="assets/images/ipey.jpeg" class="profile-pic" id="profilePic">
      <div class="dropdown">
        <a href="profile.html">👤 My Profile</a>
        <a href="my-gigs.html">📋 My Gigs</a>
        <a href="#" onclick="doLogout()" style="color:#dc2626">🚪 Logout</a>
      </div>
    </div>
  </header>

  <div class="back-button" onclick="window.location.href='home.html'">
    <i class="fa-solid fa-arrow-left"></i> Back to Home
  </div>

  <div class="page-header">
    <h1>📋 Live Gigs</h1>
    <p>Physical micro-tasks by students, for students</p>
  </div>

  <div class="action-bar">
    <button class="btn-primary" onclick="window.location.href='post-gig.html'">
      <i class="fa-solid fa-plus"></i> Post a Gig
    </button>
    <button class="btn-secondary" id="becomeTaskerBtn" onclick="window.location.href='tasker-apply.html'">
      <i class="fa-solid fa-id-badge"></i> Become a Tasker
    </button>
  </div>

  <div class="filters-bar">
    <select id="statusFilter" onchange="loadGigs()">
      <option value="all">All Status</option>
      <option value="live">Live</option>
      <option value="grabbed">Grabbed</option>
      <option value="completed">Completed</option>
    </select>
    <select id="locationFilter" onchange="loadGigs()">
      <option value="all">All Locations</option>
      <option value="Kulliyyah">Kulliyyah</option>
      <option value="Hostel">Hostel</option>
      <option value="Cafeteria">Cafeteria</option>
      <option value="Library">Library</option>
      <option value="Other">Other</option>
    </select>
    <input type="number" id="maxReward" placeholder="Max Reward (RM)" onchange="loadGigs()" min="0" step="5">
  </div>

  <div class="gigs-container" id="gigsContainer">
    <div class="empty-state">
      <i class="fa-solid fa-spinner fa-spin"></i>
      <p>Loading gigs...</p>
    </div>
  </div>

  <!-- Grab Confirmation Modal -->
  <div class="modal-overlay" id="grabModal">
    <div class="modal-content">
      <span class="modal-close" onclick="closeGrabModal()">&times;</span>
      <h3 class="modal-title">Confirm Grab?</h3>
      <div class="modal-body" id="grabModalBody"></div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeGrabModal()">Cancel</button>
        <button class="btn-confirm" id="btnConfirmGrab">✓ Confirm Grab</button>
      </div>
    </div>
  </div>

  <!-- Flag Modal -->
  <div class="modal-overlay" id="flagModal">
    <div class="modal-content">
      <span class="modal-close" onclick="closeFlagModal()">&times;</span>
      <h3 class="modal-title">Report This Gig</h3>
      <div class="modal-body">
        <p>Why are you reporting this gig?</p>
        <textarea id="flagReason" rows="3" placeholder="e.g. Inappropriate content, academic dishonesty..."
          style="width:100%;padding:10px;border:1px solid #ccc;border-radius:8px;font-family:inherit;"></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeFlagModal()">Cancel</button>
        <button class="btn-confirm" id="btnConfirmFlag" style="background:#dc2626;">⚠️ Submit Report</button>
      </div>
    </div>
  </div>

  <footer>
    &copy; 2025 IT'aawun | Mutual Assistance Platform
  </footer>

  <script>
    const SUPABASE_URL = 'https://fyahebgkacjsxmiwteny.supabase.co'
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ5YWhlYmdrYWNqc3htaXd0ZW55Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAyNTg3NDEsImV4cCI6MjA4NTgzNDc0MX0.eIAWIPzB6EjW7rPKHLSsc2ryUBQ7yicRK1I-SxXg_2Y'
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

    let currentUser = null
    let currentProfile = null
    let selectedGigId = null

      // Auth check
      (async function init() {
        const { data: { session } } = await db.auth.getSession()
        if (!session) {
          window.location.href = 'index.html'
          return
        }
        currentUser = session.user

        // Load profile
        const { data: profile } = await db.from('profiles').select('*').eq('id', currentUser.id).single()
        currentProfile = profile

        // Load profile picture
        if (profile?.avatar_url) {
          document.getElementById('profilePic').src = profile.avatar_url
        }

        // Hide "Become a Tasker" button if already a tasker
        if (profile?.role === 'tasker') {
          const btn = document.getElementById('becomeTaskerBtn')
          if (btn) {
            btn.textContent = '✓ Tasker Active'
            btn.disabled = true
            btn.style.opacity = '0.6'
          }
        }

        loadGigs()
      })()

    // Load gigs from Supabase
    async function loadGigs() {
      const statusFilter = document.getElementById('statusFilter').value
      const locationFilter = document.getElementById('locationFilter').value
      const maxReward = parseFloat(document.getElementById('maxReward').value) || null

      let query = db.from('gigs').select(`
        *,
        requester:profiles!gigs_requester_id_fkey(full_name, avatar_url)
      `).order('created_at', { ascending: false })

      // Apply filters
      if (statusFilter !== 'all') {
        query = query.eq('status', statusFilter)
      }
      if (locationFilter !== 'all') {
        query = query.ilike('location', `%${locationFilter}%`)
      }
      if (maxReward !== null) {
        query = query.lte('reward_amount', maxReward)
      }

      const { data, error } = await query

      const container = document.getElementById('gigsContainer')
      if (error || !data || data.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <i class="fa-solid fa-clipboard-list"></i>
            <p>No gigs found. Be the first to post one!</p>
          </div>
        `
        return
      }

      container.innerHTML = data.map(gig => renderGigCard(gig)).join('')
    }

    function renderGigCard(gig) {
      const requester = gig.requester || {}
      const avatar = requester.avatar_url || 'assets/images/OIP.jpg'
      const name = requester.full_name || 'Anonymous'
      const reward = parseFloat(gig.reward_amount || 0).toFixed(2)
      const timeAgo = timeAgoStr(gig.created_at)
      const isOwn = gig.requester_id === currentUser?.id
      const isTasker = currentProfile?.role === 'tasker'

      let actionButton = ''
      if (gig.status === 'live' && !isOwn) {
        if (isTasker) {
          actionButton = `<button class="btn-grab" onclick="openGrabModal('${gig.id}')">🤲 Grab Gig</button>`
        } else {
          actionButton = `<button class="btn-grab" disabled onclick="window.location.href='tasker-apply.html'">Apply to be Tasker</button>`
        }
      } else if (gig.status === 'grabbed' && !isOwn) {
        actionButton = `<button class="btn-grab" disabled>✓ Grabbed</button>`
      } else if (isOwn) {
        actionButton = `<button class="btn-grab" disabled>Your Gig</button>`
      } else {
        actionButton = `<button class="btn-grab" disabled>Unavailable</button>`
      }

      return `
        <div class="gig-card">
          <div class="gig-header">
            <h3 class="gig-title">${escapeHtml(gig.title)}</h3>
            <div class="gig-meta">
              <span class="status-badge status-${gig.status}">${gig.status}</span>
              <span class="gig-reward">RM${reward}</span>
            </div>
          </div>
          <div class="gig-body">
            <p class="gig-desc">${escapeHtml(gig.description)}</p>
            <div class="gig-location">
              <i class="fa-solid fa-location-dot"></i>
              ${escapeHtml(gig.location)}
            </div>
            <div class="gig-time">
              <i class="fa-regular fa-clock"></i> Posted ${timeAgo}
            </div>
          </div>
          <div class="requester-info">
            <img src="${avatar}" class="requester-avatar" onerror="this.src='assets/images/OIP.jpg'">
            <span class="requester-name">${escapeHtml(name)}</span>
          </div>
          <div class="gig-footer">
            ${actionButton}
            <button class="btn-flag" onclick="openFlagModal('${gig.id}')">⚠️</button>
          </div>
        </div>
      `
    }

    function escapeHtml(text) {
      if (!text) return ''
      return String(text).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;')
    }

    function timeAgoStr(timestamp) {
      const seconds = Math.floor((new Date() - new Date(timestamp)) / 1000)
      if (seconds < 60) return 'just now'
      if (seconds < 3600) return Math.floor(seconds / 60) + 'm ago'
      if (seconds < 86400) return Math.floor(seconds / 3600) + 'h ago'
      return Math.floor(seconds / 86400) + 'd ago'
    }

    // Grab Modal
    function openGrabModal(gigId) {
      selectedGigId = gigId
      document.getElementById('grabModalBody').innerHTML = '<p>You are about to claim this gig. Make sure you can complete the task before confirming.</p>'
      document.getElementById('grabModal').style.display = 'block'
    }

    function closeGrabModal() {
      document.getElementById('grabModal').style.display = 'none'
      selectedGigId = null
    }

    document.getElementById('btnConfirmGrab').addEventListener('click', async function () {
      if (!selectedGigId) return

      const btn = this
      btn.disabled = true
      btn.textContent = 'Grabbing...'

      // Create claim
      const { error } = await db.from('gig_claims').insert({
        gig_id: selectedGigId,
        tasker_id: currentUser.id
      })

      if (error) {
        alert('Error grabbing gig: ' + error.message)
        btn.disabled = false
        btn.textContent = '✓ Confirm Grab'
        return
      }

      // Update gig status
      await db.from('gigs').update({ status: 'grabbed' }).eq('id', selectedGigId)

      closeGrabModal()
      loadGigs()
      alert('✅ Gig grabbed! Check "My Gigs" to track progress.')
    })

    // Flag Modal
    function openFlagModal(gigId) {
      selectedGigId = gigId
      document.getElementById('flagReason').value = ''
      document.getElementById('flagModal').style.display = 'block'
    }

    function closeFlagModal() {
      document.getElementById('flagModal').style.display = 'none'
      selectedGigId = null
    }

    document.getElementById('btnConfirmFlag').addEventListener('click', async function () {
      if (!selectedGigId) return

      const reason = document.getElementById('flagReason').value.trim()
      const btn = this
      btn.disabled = true
      btn.textContent = 'Submitting...'

      // Insert flag
      const { error } = await db.from('gig_flags').insert({
        gig_id: selectedGigId,
        reporter_id: currentUser.id,
        reason: reason || 'Inappropriate content'
      })

      if (error) {
        alert('Error submitting report: ' + error.message)
        btn.disabled = false
        btn.textContent = '⚠️ Submit Report'
        return
      }

      closeFlagModal()
      alert('✅ Report submitted. Admin will review.')
    })

    async function doLogout() {
      const { error } = await db.auth.signOut()
      if (error) console.error('Logout error:', error)
      window.location.replace('index.html?logged=out')
    }
  </script>
</body>

</html>
