<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — iTa'awun</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green:#1D9E75; --green-light:#e8f7f2; --green-dark:#15785a;
    --gray-50:#f9fafb; --gray-100:#f3f4f6; --gray-200:#e5e7eb;
    --gray-400:#9ca3af; --gray-500:#6b7280; --gray-600:#4b5563; --gray-900:#111827;
    --red:#ef4444; --orange:#f97316; --blue:#3b82f6; --purple:#7c3aed;
    --radius:12px; --shadow:0 1px 3px rgba(0,0,0,.08);
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--gray-50); color: var(--gray-900); min-height: 100vh; padding-bottom: 2rem; }

  /* ── HEADER ── */
  .header { background: var(--gray-900); padding: 0 1rem; height: 52px; display: flex; align-items: center; gap: .75rem; position: sticky; top: 0; z-index: 100; }
  .header-logo  { font-size: 1rem; font-weight: 700; color: #fff; letter-spacing: -.02em; flex: 1; }
  .header-badge { font-size: .72rem; background: var(--red); color: #fff; padding: .15rem .55rem; border-radius: 100px; font-weight: 600; }
  .back-btn     { color: var(--gray-400); text-decoration: none; font-size: .85rem; }

  /* ── TABS ── */
  .tabs-wrap { background: var(--gray-900); border-bottom: 1px solid #374151; position: sticky; top: 52px; z-index: 90; }
  .tabs { display: flex; overflow-x: auto; scrollbar-width: none; padding: 0 .5rem; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { flex-shrink: 0; padding: .65rem .85rem; font-size: .8rem; font-weight: 500; color: #9ca3af; border-bottom: 2px solid transparent; cursor: pointer; white-space: nowrap; background: none; border-top: none; border-left: none; border-right: none; font-family: inherit; transition: color .15s, border-color .15s; }
  .tab:hover { color: #e5e7eb; }
  .tab.active { color: #fff; border-bottom-color: var(--green); }
  .tab .cnt { display: inline-flex; align-items: center; justify-content: center; background: #374151; color: #9ca3af; font-size: .62rem; font-weight: 700; border-radius: 100px; padding: .05rem .3rem; margin-left: .3rem; min-width: 16px; line-height: 1.4; }
  .tab.active .cnt { background: var(--green-dark); color: #fff; }

  /* ── PANEL ── */
  .panel { display: none; } .panel.active { display: block; }

  /* ── STAT GRID ── */
  .stat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: .5rem; padding: .75rem; }
  .stat-card { background: #fff; border: 1px solid var(--gray-100); border-radius: var(--radius); padding: .85rem; }
  .stat-label { font-size: .7rem; color: var(--gray-400); text-transform: uppercase; letter-spacing: .05em; font-weight: 500; margin-bottom: .3rem; }
  .stat-num   { font-size: 1.3rem; font-weight: 800; }
  .stat-sub   { font-size: .72rem; color: var(--gray-400); margin-top: .2rem; }
  .c-green  { color: var(--green); }
  .c-blue   { color: var(--blue); }
  .c-orange { color: var(--orange); }
  .c-purple { color: var(--purple); }

  /* ── SECTION ── */
  .section { background: #fff; border-top: 1px solid var(--gray-100); border-bottom: 1px solid var(--gray-100); margin-top: .5rem; }
  .sec-head { display: flex; align-items: center; justify-content: space-between; padding: .75rem 1rem .4rem; }
  .sec-title { font-size: .82rem; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--gray-500); }

  /* ── SEARCH BAR ── */
  .search-bar { padding: .6rem 1rem; background: #fff; border-bottom: 1px solid var(--gray-100); }
  .search-input { width: 100%; border: 1.5px solid var(--gray-200); border-radius: 9px; padding: .6rem .85rem; font-size: .875rem; font-family: inherit; outline: none; transition: border-color .15s; }
  .search-input:focus { border-color: var(--green); }

  /* ── ROW ITEMS ── */
  .row-item { display: flex; align-items: center; gap: .75rem; padding: .75rem 1rem; border-bottom: 1px solid var(--gray-50); transition: background .1s; }
  .row-item:last-child { border-bottom: none; }
  .row-item:hover { background: var(--gray-50); }
  .row-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--green-light); display: flex; align-items: center; justify-content: center; font-size: .9rem; font-weight: 700; color: var(--green-dark); flex-shrink: 0; overflow: hidden; }
  .row-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .row-info  { flex: 1; min-width: 0; }
  .row-name  { font-size: .875rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .row-sub   { font-size: .73rem; color: var(--gray-400); margin-top: .1rem; }
  .row-right { display: flex; flex-direction: column; align-items: flex-end; gap: .3rem; flex-shrink: 0; }

  /* ── BADGES ── */
  .badge { display: inline-flex; align-items: center; font-size: .68rem; font-weight: 600; padding: .18rem .5rem; border-radius: 100px; white-space: nowrap; }
  .b-member  { background: var(--gray-100); color: var(--gray-600); }
  .b-tasker  { background: #f5f3ff; color: #5b21b6; }
  .b-vendor  { background: var(--green-light); color: var(--green-dark); }
  .b-asnaf   { background: #dbeafe; color: #1e40af; }
  .b-admin   { background: #fee2e2; color: #991b1b; }
  .b-pending { background: #fef3c7; color: #92400e; }
  .b-active  { background: var(--green-light); color: var(--green-dark); }
  .b-paused  { background: var(--gray-100); color: var(--gray-500); }
  .b-disputed{ background: #fff7ed; color: #9a3412; }

  /* ── ACTION BUTTONS ── */
  .act-btn { font-size: .75rem; font-weight: 600; padding: .28rem .65rem; border-radius: 7px; border: none; cursor: pointer; font-family: inherit; transition: opacity .15s; white-space: nowrap; }
  .act-btn:hover { opacity: .85; }
  .act-btn:disabled { opacity: .4; cursor: default; }
  .btn-approve  { background: var(--green); color: #fff; }
  .btn-reject   { background: #fee2e2; color: var(--red); }
  .btn-suspend  { background: #fef3c7; color: #92400e; }
  .btn-restore  { background: var(--green-light); color: var(--green-dark); }
  .btn-role     { background: var(--gray-100); color: var(--gray-700, #374151); }
  .btn-verify   { background: #dbeafe; color: #1e40af; }

  /* ── FEATURE FLAGS ── */
  .flag-item { display: flex; align-items: center; gap: .75rem; padding: .85rem 1rem; border-bottom: 1px solid var(--gray-50); }
  .flag-item:last-child { border-bottom: none; }
  .flag-info  { flex: 1; min-width: 0; }
  .flag-name  { font-size: .875rem; font-weight: 600; margin-bottom: .15rem; }
  .flag-desc  { font-size: .75rem; color: var(--gray-400); line-height: 1.4; }
  .toggle-wrap { flex-shrink: 0; }
  .toggle { position: relative; width: 44px; height: 24px; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider { position: absolute; inset: 0; background: var(--gray-200); border-radius: 24px; cursor: pointer; transition: background .2s; }
  .toggle-slider::before { content: ''; position: absolute; width: 18px; height: 18px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: transform .2s; box-shadow: 0 1px 3px rgba(0,0,0,.2); }
  .toggle input:checked + .toggle-slider { background: var(--green); }
  .toggle input:checked + .toggle-slider::before { transform: translateX(20px); }

  /* ── ASNAF CARD ── */
  .asnaf-card { background: #fff; border: 1px solid var(--gray-200); border-radius: var(--radius); margin: .5rem .75rem; overflow: hidden; }
  .asnaf-top  { padding: .85rem; }
  .asnaf-name { font-size: .9rem; font-weight: 600; margin-bottom: .2rem; }
  .asnaf-meta { font-size: .75rem; color: var(--gray-500); line-height: 1.5; }
  .asnaf-detail { display: grid; grid-template-columns: 1fr 1fr; gap: .35rem; background: var(--gray-50); padding: .65rem .85rem; border-top: 1px solid var(--gray-100); }
  .asnaf-d    { font-size: .75rem; }
  .asnaf-d .lbl { color: var(--gray-400); }
  .asnaf-d .val { font-weight: 600; color: var(--gray-900); }
  .asnaf-actions { display: flex; gap: .5rem; padding: .65rem .85rem; border-top: 1px solid var(--gray-100); }
  .asnaf-actions .act-btn { flex: 1; padding: .55rem; text-align: center; }

  /* ── DISPUTE CARD ── */
  .dispute-card { background: #fff; border: 1px solid var(--gray-200); border-left: 3px solid var(--orange); border-radius: var(--radius); margin: .5rem .75rem; padding: .85rem; }
  .dispute-top  { display: flex; align-items: flex-start; justify-content: space-between; gap: .75rem; margin-bottom: .5rem; }
  .dispute-info .d-title { font-size: .875rem; font-weight: 600; margin-bottom: .15rem; }
  .dispute-info .d-meta  { font-size: .75rem; color: var(--gray-400); }
  .dispute-actions { display: flex; gap: .4rem; margin-top: .5rem; }

  /* ── EMPTY ── */
  .empty-row { padding: 1.5rem 1rem; text-align: center; font-size: .82rem; color: var(--gray-400); }

  /* ── SKELETON ── */
  .skeleton { background: linear-gradient(90deg, var(--gray-100) 25%, var(--gray-200) 50%, var(--gray-100) 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 8px; }
  @keyframes shimmer { to { background-position: -200% 0; } }

  #toast { display: none; position: fixed; bottom: 1.25rem; left: 50%; transform: translateX(-50%); background: var(--gray-900); color: #fff; padding: .65rem 1.25rem; border-radius: 8px; font-size: .85rem; z-index: 999; max-width: 88vw; text-align: center; }
</style>
</head>
<body>

<header class="header">
  <a class="back-btn" href="home.html">&#8592;</a>
  <div class="header-logo">iTa'awun <span class="header-badge">ADMIN</span></div>
</header>

<div class="tabs-wrap">
  <div class="tabs">
    <button class="tab active" data-panel="overview"  onclick="switchTab('overview')">Overview</button>
    <button class="tab"        data-panel="orders"    onclick="switchTab('orders')">Disputes <span class="cnt" id="cnt-orders">—</span></button>
    <button class="tab"        data-panel="asnaf"     onclick="switchTab('asnaf')">Asnaf <span class="cnt" id="cnt-asnaf">—</span></button>
    <button class="tab"        data-panel="vendors"   onclick="switchTab('vendors')">Vendors <span class="cnt" id="cnt-vendors">—</span></button>
    <button class="tab"        data-panel="users"     onclick="switchTab('users')">Users</button>
    <button class="tab"        data-panel="flags"     onclick="switchTab('flags')">Flags</button>
  </div>
</div>

<!-- ── OVERVIEW ── -->
<div class="panel active" id="panel-overview">
  <div class="stat-grid" id="stat-grid">
    <div class="skeleton" style="height:80px;border-radius:12px"></div>
    <div class="skeleton" style="height:80px;border-radius:12px"></div>
    <div class="skeleton" style="height:80px;border-radius:12px"></div>
    <div class="skeleton" style="height:80px;border-radius:12px"></div>
  </div>
  <div class="section" id="recent-activity">
    <div class="sec-head"><span class="sec-title">Recent Orders</span></div>
    <div id="recent-orders-list"><div class="skeleton" style="height:48px;margin:.5rem 1rem;border-radius:8px"></div></div>
  </div>
</div>

<!-- ── DISPUTES ── -->
<div class="panel" id="panel-orders">
  <div style="padding:.75rem 1rem .3rem;font-size:.82rem;color:var(--gray-500)">Orders with <strong style="color:var(--orange)">disputed</strong> status requiring resolution.</div>
  <div id="disputes-list"><div class="empty-row">Loading…</div></div>
</div>

<!-- ── ASNAF ── -->
<div class="panel" id="panel-asnaf">
  <div style="padding:.75rem 1rem .3rem;font-size:.82rem;color:var(--gray-500)">Review pending Asnaf applications.</div>
  <div id="asnaf-list"><div class="empty-row">Loading…</div></div>
</div>

<!-- ── VENDORS ── -->
<div class="panel" id="panel-vendors">
  <div class="search-bar"><input class="search-input" id="vendor-search" placeholder="Search vendors…" oninput="filterVendors()"></div>
  <div class="section">
    <div id="vendors-list"><div class="empty-row">Loading…</div></div>
  </div>
</div>

<!-- ── USERS ── -->
<div class="panel" id="panel-users">
  <div class="search-bar"><input class="search-input" id="user-search" placeholder="Search by name or email…" oninput="filterUsers()"></div>
  <div class="section">
    <div id="users-list"><div class="empty-row">Loading…</div></div>
  </div>
</div>

<!-- ── FEATURE FLAGS ── -->
<div class="panel" id="panel-flags">
  <div class="section" style="margin-top:.75rem">
    <div id="flags-list"><div class="empty-row">Loading…</div></div>
  </div>
  <div style="padding:.75rem 1rem;font-size:.75rem;color:var(--gray-400);line-height:1.5">
    Flag changes take effect immediately for all users at this institution.
  </div>
</div>

<div id="toast"></div>

<script>
let allUsers    = []
let allVendors  = []
let allFlags    = []
let statsLoaded = false

async function init() {
  const session = await requireAuth()
  if (!session) return

  // Admin guard
  const { data: me } = await db.from('users').select('role').eq('id', session.user.id).single()
  if (me?.role !== 'admin') { window.location.href = 'home.html'; return }

  loadOverview()
}

// ── OVERVIEW ─────────────────────────────────────────────
async function loadOverview() {
  if (statsLoaded) return
  statsLoaded = true

  const [usersRes, vendorsRes, ordersRes, disputesRes, asnafRes] = await Promise.all([
    db.from('users').select('id', { count: 'exact', head: true }).eq('institution_id', INSTITUTION_ID),
    db.from('vendors').select('id', { count: 'exact', head: true }).eq('institution_id', INSTITUTION_ID).eq('is_active', true),
    db.from('orders').select('total_amount').eq('status', 'completed'),
    db.from('orders').select('id', { count: 'exact', head: true }).eq('status', 'disputed'),
    db.from('users').select('id', { count: 'exact', head: true }).eq('asnaf_status', 'pending')
  ])

  const revenue = (ordersRes.data || []).reduce((s, o) => s + parseFloat(o.total_amount || 0), 0)

  document.getElementById('stat-grid').innerHTML = `
    <div class="stat-card"><div class="stat-label">Total Users</div><div class="stat-num c-blue">${usersRes.count ?? '—'}</div><div class="stat-sub">registered</div></div>
    <div class="stat-card"><div class="stat-label">Active Vendors</div><div class="stat-num c-green">${vendorsRes.count ?? '—'}</div><div class="stat-sub">live shops</div></div>
    <div class="stat-card"><div class="stat-label">Platform Revenue</div><div class="stat-num c-green">RM ${revenue.toFixed(0)}</div><div class="stat-sub">completed orders</div></div>
    <div class="stat-card"><div class="stat-label">Pending Asnaf</div><div class="stat-num c-orange">${asnafRes.count ?? '—'}</div><div class="stat-sub">awaiting review</div></div>`

  document.getElementById('cnt-orders').textContent = disputesRes.count ?? 0
  document.getElementById('cnt-asnaf').textContent  = asnafRes.count ?? 0

  // Recent orders
  const { data: recent } = await db.from('orders')
    .select('id, status, total_amount, created_at, products(name), public_profiles!buyer_id(full_name)')
    .order('created_at', { ascending: false }).limit(8)

  const STATUS_CLS = { pending:'b-pending', confirmed:'b-active', in_progress:'b-active', ready:'b-active', completed:'b-vendor', cancelled:'b-member', disputed:'b-disputed' }
  document.getElementById('recent-orders-list').innerHTML = (recent || []).map(o => `
    <a href="order-detail.html?id=${o.id}" style="display:flex;align-items:center;gap:.75rem;padding:.65rem 1rem;border-bottom:1px solid var(--gray-50);text-decoration:none;color:inherit;transition:background .1s" onmouseover="this.style.background='var(--gray-50)'" onmouseout="this.style.background=''">
      <div style="flex:1;min-width:0">
        <div style="font-size:.83rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${o.products?.name || 'Order'}</div>
        <div style="font-size:.72rem;color:var(--gray-400)">${o.public_profiles?.full_name || '—'} · ${new Date(o.created_at).toLocaleDateString('en-MY',{day:'numeric',month:'short'})}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:.25rem;flex-shrink:0">
        <span style="font-size:.82rem;font-weight:600">RM ${parseFloat(o.total_amount).toFixed(2)}</span>
        <span class="badge ${STATUS_CLS[o.status] || 'b-member'}">${o.status}</span>
      </div>
    </a>`).join('') || '<div class="empty-row">No orders yet.</div>'
}

// ── DISPUTES ─────────────────────────────────────────────
async function loadDisputes() {
  const { data } = await db.from('orders')
    .select('id, total_amount, created_at, payment_method, buyer_notes, products(name), vendors(shop_name), public_profiles!buyer_id(full_name)')
    .eq('status', 'disputed')
    .order('created_at', { ascending: false })

  const list = document.getElementById('disputes-list')
  if (!data?.length) { list.innerHTML = '<div class="empty-row">✅ No disputed orders.</div>'; return }

  list.innerHTML = (data || []).map(o => `
    <div class="dispute-card">
      <div class="dispute-top">
        <div class="dispute-info">
          <div class="d-title">${o.products?.name || 'Order'}</div>
          <div class="d-meta">${o.public_profiles?.full_name || '—'} → ${o.vendors?.shop_name || '—'} · RM ${parseFloat(o.total_amount).toFixed(2)} · ${new Date(o.created_at).toLocaleDateString('en-MY',{day:'numeric',month:'short'})}</div>
        </div>
        <span class="badge b-disputed">⚠️ Disputed</span>
      </div>
      ${o.buyer_notes ? `<div style="font-size:.78rem;color:var(--gray-600);background:var(--gray-50);border-radius:7px;padding:.45rem .65rem;margin-bottom:.5rem">Note: ${o.buyer_notes}</div>` : ''}
      <div class="dispute-actions">
        <button class="act-btn btn-approve" onclick="resolveDispute('${o.id}','completed',this)">✅ Resolve — Complete</button>
        <button class="act-btn btn-reject"  onclick="resolveDispute('${o.id}','cancelled',this)">✖ Resolve — Cancel</button>
      </div>
    </div>`).join('')
}

async function resolveDispute(orderId, status, btn) {
  btn.disabled = true
  const { error } = await db.from('orders').update({ status }).eq('id', orderId)
  if (error) { btn.disabled = false; showToast('Failed to update.'); return }
  showToast('Order resolved as ' + status + '.')
  loadDisputes()
  document.getElementById('cnt-orders').textContent = Math.max(0, parseInt(document.getElementById('cnt-orders').textContent) - 1)
}

// ── ASNAF ─────────────────────────────────────────────────
async function loadAsnaf() {
  const { data } = await db.from('users')
    .select('id, full_name, asnaf_applied_name, asnaf_ic, asnaf_income, asnaf_dependants, asnaf_situation, asnaf_doc_url, asnaf_doc2_url, asnaf_status, created_at')
    .eq('asnaf_status', 'pending')
    .eq('institution_id', INSTITUTION_ID)
    .order('created_at', { ascending: true })

  const list = document.getElementById('asnaf-list')
  if (!data?.length) { list.innerHTML = '<div class="empty-row">✅ No pending applications.</div>'; return }

  list.innerHTML = (data || []).map(u => `
    <div class="asnaf-card" id="asnaf-${u.id}">
      <div class="asnaf-top">
        <div class="asnaf-name">${u.asnaf_applied_name || u.full_name || '—'}</div>
        <div class="asnaf-meta">IC: ${u.asnaf_ic || '—'} · Submitted ${new Date(u.created_at).toLocaleDateString('en-MY',{day:'numeric',month:'short'})}</div>
        ${u.asnaf_situation ? `<div style="font-size:.78rem;color:var(--gray-600);margin-top:.4rem;line-height:1.5">"${u.asnaf_situation}"</div>` : ''}
      </div>
      <div class="asnaf-detail">
        <div class="asnaf-d"><div class="lbl">Monthly income</div><div class="val">RM ${u.asnaf_income ? parseFloat(u.asnaf_income).toLocaleString() : '—'}</div></div>
        <div class="asnaf-d"><div class="lbl">Dependants</div><div class="val">${u.asnaf_dependants ?? '—'} person(s)</div></div>
        ${u.asnaf_doc_url ? `<div class="asnaf-d" style="grid-column:span 2"><div class="lbl">Document</div><div class="val" style="color:var(--blue);word-break:break-all">${u.asnaf_doc_url.split('/').pop()}</div></div>` : ''}
      </div>
      <div class="asnaf-actions">
        <button class="act-btn btn-approve" onclick="reviewAsnaf('${u.id}','asnaf',this)">✅ Approve</button>
        <button class="act-btn btn-reject"  onclick="reviewAsnaf('${u.id}','rejected',this)">✖ Reject</button>
      </div>
    </div>`).join('')
}

async function reviewAsnaf(userId, decision, btn) {
  btn.disabled = true
  const updates = decision === 'asnaf'
    ? { role: 'asnaf', asnaf_status: 'approved' }
    : { asnaf_status: 'rejected' }

  const { error } = await db.from('users').update(updates).eq('id', userId)
  if (error) { btn.disabled = false; showToast('Failed.'); return }

  document.getElementById('asnaf-' + userId)?.remove()
  const cnt = parseInt(document.getElementById('cnt-asnaf').textContent) - 1
  document.getElementById('cnt-asnaf').textContent = Math.max(0, cnt)
  showToast(decision === 'asnaf' ? 'Approved! Role updated to Asnaf.' : 'Application rejected.')
  if (!document.querySelectorAll('[id^="asnaf-"]').length)
    document.getElementById('asnaf-list').innerHTML = '<div class="empty-row">✅ No pending applications.</div>'
}

// ── VENDORS ───────────────────────────────────────────────
async function loadVendors() {
  const { data } = await db.from('vendors')
    .select('id, shop_name, category, is_active, avg_rating, created_at, users!owner_id(full_name)')
    .eq('institution_id', INSTITUTION_ID)
    .order('created_at', { ascending: false })

  allVendors = data || []
  document.getElementById('cnt-vendors').textContent = allVendors.length
  renderVendors(allVendors)
}

function filterVendors() {
  const q = document.getElementById('vendor-search').value.toLowerCase()
  renderVendors(allVendors.filter(v => v.shop_name.toLowerCase().includes(q) || (v.users?.full_name || '').toLowerCase().includes(q)))
}

function renderVendors(vendors) {
  const list = document.getElementById('vendors-list')
  if (!vendors.length) { list.innerHTML = '<div class="empty-row">No vendors found.</div>'; return }
  list.innerHTML = vendors.map(v => `
    <div class="row-item">
      <div class="row-avatar" style="border-radius:9px">🏪</div>
      <div class="row-info">
        <div class="row-name">${v.shop_name}</div>
        <div class="row-sub">${v.users?.full_name || '—'} · ${v.category || '—'} · ★ ${v.avg_rating ? parseFloat(v.avg_rating).toFixed(1) : 'New'}</div>
      </div>
      <div class="row-right">
        <span class="badge ${v.is_active ? 'b-active' : 'b-paused'}">${v.is_active ? 'Live' : 'Paused'}</span>
        <button class="act-btn ${v.is_active ? 'btn-suspend' : 'btn-restore'}" onclick="toggleVendor('${v.id}',${v.is_active},this)">
          ${v.is_active ? 'Suspend' : 'Restore'}
        </button>
      </div>
    </div>`).join('')
}

async function toggleVendor(vendorId, current, btn) {
  btn.disabled = true
  const { error } = await db.from('vendors').update({ is_active: !current }).eq('id', vendorId)
  if (error) { btn.disabled = false; showToast('Failed.'); return }
  const v = allVendors.find(v => v.id === vendorId)
  if (v) v.is_active = !current
  renderVendors(allVendors)
  showToast(!current ? 'Shop restored.' : 'Shop suspended.')
}

// ── USERS ─────────────────────────────────────────────────
async function loadUsers() {
  const { data } = await db.from('users')
    .select('id, full_name, role, trust_score, matric_card_url, created_at')
    .eq('institution_id', INSTITUTION_ID)
    .order('created_at', { ascending: false })
    .limit(100)

  allUsers = data || []
  renderUsers(allUsers)
}

function filterUsers() {
  const q = document.getElementById('user-search').value.toLowerCase()
  renderUsers(allUsers.filter(u => (u.full_name || '').toLowerCase().includes(q)))
}

const ROLE_CLS = { member:'b-member', tasker:'b-tasker', vendor:'b-vendor', asnaf:'b-asnaf', admin:'b-admin' }

function renderUsers(users) {
  const list = document.getElementById('users-list')
  if (!users.length) { list.innerHTML = '<div class="empty-row">No users found.</div>'; return }
  list.innerHTML = users.map(u => `
    <div class="row-item">
      <div class="row-avatar">${(u.full_name || '?').charAt(0).toUpperCase()}</div>
      <div class="row-info">
        <div class="row-name">${u.full_name || 'Unnamed'}</div>
        <div class="row-sub">Trust: ${u.trust_score ?? 0} · Joined ${new Date(u.created_at).toLocaleDateString('en-MY',{day:'numeric',month:'short',year:'numeric'})}</div>
      </div>
      <div class="row-right">
        <span class="badge ${ROLE_CLS[u.role] || 'b-member'}">${u.role || 'member'}</span>
        <div style="display:flex;gap:.3rem;flex-wrap:wrap;justify-content:flex-end">
          <select class="act-btn btn-role" style="padding:.28rem .4rem;cursor:pointer" onchange="changeRole('${u.id}',this.value)" title="Change role">
            ${['member','tasker','vendor','asnaf','admin'].map(r => `<option value="${r}" ${u.role===r?'selected':''}>${r}</option>`).join('')}
          </select>
          ${u.matric_card_url && u.role === 'member' ? `<button class="act-btn btn-verify" onclick="verifyMatric('${u.id}',this)">Verify</button>` : ''}
        </div>
      </div>
    </div>`).join('')
}

async function changeRole(userId, role) {
  const { error } = await db.from('users').update({ role }).eq('id', userId)
  if (error) { showToast('Failed to update role.'); return }
  const u = allUsers.find(u => u.id === userId)
  if (u) u.role = role
  showToast('Role updated to ' + role + '.')
  renderUsers(allUsers.filter(u => (u.full_name || '').toLowerCase().includes(document.getElementById('user-search').value.toLowerCase())))
}

async function verifyMatric(userId, btn) {
  btn.disabled = true
  const { error } = await db.from('users').update({ role: 'member' }).eq('id', userId)
  if (error) { btn.disabled = false; showToast('Failed.'); return }
  showToast('Matric verified — user remains Member.')
  btn.remove()
}

// ── FEATURE FLAGS ─────────────────────────────────────────
async function loadFlags() {
  const { data } = await db.from('feature_flags')
    .select('id, feature_name, enabled, description')
    .eq('institution_id', INSTITUTION_ID)
    .order('feature_name')

  allFlags = data || []

  const FLAG_LABELS = {
    campus_vendors: { name: 'Campus Vendors', desc: 'Students can browse and order from vendor shops.' },
    live_gigs:      { name: 'Live Gigs',      desc: 'Students can post and accept real-time gig requests. (CFS IIUM: OFF)' }
  }

  document.getElementById('flags-list').innerHTML = allFlags.length
    ? allFlags.map(f => {
        const info = FLAG_LABELS[f.feature_name] || { name: f.feature_name, desc: f.description || '' }
        return `<div class="flag-item">
          <div class="flag-info">
            <div class="flag-name">${info.name}</div>
            <div class="flag-desc">${info.desc}</div>
          </div>
          <div class="toggle-wrap">
            <label class="toggle">
              <input type="checkbox" ${f.enabled ? 'checked' : ''} onchange="toggleFlag('${f.id}', this.checked)">
              <span class="toggle-slider"></span>
            </label>
          </div>
        </div>`
      }).join('')
    : '<div class="empty-row">No feature flags found.</div>'
}

async function toggleFlag(flagId, enabled) {
  const { error } = await db.from('feature_flags').update({ enabled }).eq('id', flagId)
  if (error) { showToast('Failed to update flag.'); loadFlags(); return }
  showToast('Flag ' + (enabled ? 'enabled' : 'disabled') + '.')
}

// ── TAB SWITCHING ─────────────────────────────────────────
const loaders = { orders: loadDisputes, asnaf: loadAsnaf, vendors: loadVendors, users: loadUsers, flags: loadFlags }
const loaded  = new Set(['overview'])

function switchTab(panel) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.panel === panel))
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + panel))
  if (!loaded.has(panel) && loaders[panel]) { loaders[panel](); loaded.add(panel) }
}

init()
</script>
</body>
</html>
