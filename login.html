<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log In — iTa'awun</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green:       #1D9E75;
    --green-dark:  #15785a;
    --green-light: #e8f7f2;
    --gray-50:     #f9fafb;
    --gray-100:    #f3f4f6;
    --gray-200:    #e5e7eb;
    --gray-400:    #9ca3af;
    --gray-600:    #4b5563;
    --gray-900:    #111827;
    --red:         #ef4444;
    --radius:      12px;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--gray-50);
    color: var(--gray-900);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .header {
    background: #fff;
    border-bottom: 1px solid var(--gray-200);
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .logo { font-size: 1.1rem; font-weight: 700; color: var(--green); text-decoration: none; letter-spacing: -.02em; }
  .logo span { color: var(--gray-900); }
  .back-btn { position: absolute; left: 1rem; font-size: .85rem; color: var(--gray-600); text-decoration: none; }
  .card-wrap { flex: 1; display: flex; align-items: flex-start; justify-content: center; padding: 2rem 1rem 3rem; }
  .card { background: #fff; border: 1px solid var(--gray-200); border-radius: var(--radius); padding: 1.75rem 1.5rem; width: 100%; max-width: 400px; }
  .steps { display: flex; gap: .5rem; margin-bottom: 1.5rem; }
  .step-bar { flex: 1; height: 4px; border-radius: 2px; background: var(--gray-200); transition: background .3s; }
  .step-bar.active { background: var(--green); }
  .step { display: none; }
  .step.visible { display: block; }
  .step-title { font-size: 1.15rem; font-weight: 700; margin-bottom: .35rem; }
  .step-sub { font-size: .875rem; color: var(--gray-600); margin-bottom: 1.25rem; line-height: 1.5; }
  label { display: block; font-size: .8rem; font-weight: 500; color: var(--gray-600); margin-bottom: .4rem; text-transform: uppercase; letter-spacing: .04em; }
  .field { margin-bottom: 1rem; }
  .field input {
    width: 100%;
    border: 1.5px solid var(--gray-200);
    border-radius: 10px;
    padding: .75rem .9rem;
    font-size: .95rem;
    font-family: inherit;
    outline: none;
    transition: border-color .15s;
    color: var(--gray-900);
  }
  .field input:focus { border-color: var(--green); }
  .field input::placeholder { color: var(--gray-400); }
  .otp-wrap { display: flex; gap: .4rem; margin-bottom: .75rem; justify-content: center; }
  .otp-wrap input {
    width: 44px; height: 44px; flex: none;
    border: 1.5px solid var(--gray-200);
    border-radius: 10px;
    text-align: center;
    font-size: 1.2rem; font-weight: 600;
    outline: none;
    transition: border-color .15s;
    font-family: monospace;
    caret-color: var(--green);
  }
  .otp-wrap input:focus { border-color: var(--green); }
  .btn-main {
    width: 100%; padding: .8rem;
    background: var(--green); color: #fff;
    border: none; border-radius: 10px;
    font-size: .95rem; font-weight: 600;
    cursor: pointer; font-family: inherit;
    transition: opacity .15s, transform .1s;
    margin-top: .25rem;
  }
  .btn-main:hover { opacity: .9; }
  .btn-main:active { transform: scale(.98); }
  .btn-main:disabled { opacity: .5; cursor: default; }
  .btn-ghost { background: none; border: none; color: var(--green); font-size: .85rem; cursor: pointer; font-family: inherit; padding: 0; text-decoration: underline; }
  .btn-ghost:disabled { color: var(--gray-400); cursor: default; text-decoration: none; }
  .resend-row { display: flex; align-items: center; justify-content: space-between; margin-top: .75rem; font-size: .85rem; color: var(--gray-400); }
  .sent-to { background: var(--green-light); border-radius: 8px; padding: .5rem .75rem; font-size: .82rem; color: var(--green-dark); margin-bottom: 1rem; text-align: center; }
  .error-msg { font-size: .82rem; color: var(--red); margin-top: .5rem; display: none; }
  .error-msg.visible { display: block; }
  .bottom-link { text-align: center; margin-top: 1rem; font-size: .85rem; color: var(--gray-400); }
  .bottom-link a { color: var(--green); text-decoration: none; font-weight: 500; }
  #toast { display: none; position: fixed; bottom: 1.25rem; left: 50%; transform: translateX(-50%); background: var(--gray-900); color: #fff; padding: .65rem 1.25rem; border-radius: 8px; font-size: .85rem; z-index: 999; max-width: 88vw; text-align: center; }
</style>
</head>
<body>

<header class="header">
  <a class="back-btn" href="index.html">&#8592; Back</a>
  <a class="logo" href="index.html">iTa<span>'awun</span></a>
</header>

<div class="card-wrap">
  <div class="card">
    <div class="steps">
      <div class="step-bar active" id="bar1"></div>
      <div class="step-bar" id="bar2"></div>
    </div>

    <!-- Step 1: Email -->
    <div class="step visible" id="step1">
      <div class="step-title">Welcome back</div>
      <div class="step-sub">Enter your email address and we'll send you a login code.</div>
      <div class="field">
        <label>Email address</label>
        <input type="email" id="email-input" placeholder="you@example.com" autocomplete="email">
        <div class="error-msg" id="email-err"></div>
      </div>
      <button class="btn-main" id="send-btn" onclick="sendOTP()">Send Code</button>
      <div class="bottom-link">Don't have an account? <a href="signup.html">Sign Up</a></div>
    </div>

    <!-- Step 2: OTP -->
    <div class="step" id="step2">
      <div class="step-title">Check your email</div>
      <div class="sent-to" id="sent-to-msg"></div>
      <div class="otp-wrap" id="otp-inputs">
        <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="one-time-code">
        <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
        <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
        <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
        <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
        <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
      </div>
      <div class="error-msg" id="otp-err"></div>
      <button class="btn-main" id="verify-btn" onclick="verifyOTP()">Log In</button>
      <div class="resend-row">
        <span id="resend-timer">Resend in <span id="countdown">60</span>s</span>
        <button class="btn-ghost" id="resend-btn" disabled onclick="resendOTP()">Resend code</button>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
let currentEmail = ''
let resendCount  = 0
let countdownId  = null

const otpInputs = Array.from(document.querySelectorAll('#otp-inputs input'))
otpInputs.forEach((inp, i) => {
  inp.addEventListener('input', () => {
    inp.value = inp.value.replace(/\D/, '')
    if (inp.value && i < otpInputs.length - 1) otpInputs[i + 1].focus()
  })
  inp.addEventListener('keydown', e => {
    if (e.key === 'Backspace' && !inp.value && i > 0) otpInputs[i - 1].focus()
  })
})
function getOTP() { return otpInputs.map(i => i.value).join('') }
function clearOTP() { otpInputs.forEach(i => i.value = ''); otpInputs[0].focus() }

function goToStep(n) {
  document.querySelectorAll('.step').forEach((s, i) => s.classList.toggle('visible', i + 1 === n))
  ;[1, 2].forEach(i => document.getElementById('bar' + i).classList.toggle('active', i <= n))
}

async function sendOTP() {
  const email = document.getElementById('email-input').value.trim()
  const err   = document.getElementById('email-err')
  err.classList.remove('visible')

  if (!email.includes('@') || !email.includes('.')) {
    err.textContent = 'Enter a valid email address.'
    err.classList.add('visible')
    return
  }

  const btn = document.getElementById('send-btn')
  btn.disabled = true
  btn.textContent = 'Sending…'

  const { error } = await db.auth.signInWithOtp({ email })
  if (error) {
    btn.disabled = false
    btn.textContent = 'Send Code'
    err.textContent = error.message
    err.classList.add('visible')
    return
  }

  currentEmail = email
  document.getElementById('sent-to-msg').textContent = 'Code sent to ' + email
  goToStep(2)
  startCountdown()
}

async function verifyOTP() {
  const token = getOTP()
  const err   = document.getElementById('otp-err')
  err.classList.remove('visible')

  if (token.length < 6) {
    err.textContent = 'Enter all 6 digits.'
    err.classList.add('visible')
    return
  }

  const btn = document.getElementById('verify-btn')
  btn.disabled = true
  btn.textContent = 'Logging in…'

  const { error } = await db.auth.verifyOtp({ email: currentEmail, token, type: 'email' })
  if (error) {
    btn.disabled = false
    btn.textContent = 'Log In'
    clearOTP()
    err.textContent = error.message.includes('expired')
      ? 'Code expired. Tap Resend to get a new one.'
      : error.message.includes('invalid')
        ? 'Incorrect code. Please try again.'
        : error.message
    err.classList.add('visible')
    return
  }

  window.location.href = 'home.html'
}

async function resendOTP() {
  if (resendCount >= 3) { showToast('Maximum resend attempts reached.'); return }
  resendCount++
  document.getElementById('resend-btn').disabled = true
  const { error } = await db.auth.signInWithOtp({ email: currentEmail })
  if (error) { showToast('Failed to resend. Try again.'); return }
  clearOTP()
  startCountdown()
  showToast('New code sent to ' + currentEmail)
}

function startCountdown() {
  clearInterval(countdownId)
  let secs = 60
  document.getElementById('countdown').textContent = secs
  document.getElementById('resend-timer').style.display = 'inline'
  document.getElementById('resend-btn').disabled = true
  countdownId = setInterval(() => {
    secs--
    document.getElementById('countdown').textContent = secs
    if (secs <= 0) {
      clearInterval(countdownId)
      document.getElementById('resend-timer').style.display = 'none'
      document.getElementById('resend-btn').disabled = false
    }
  }, 1000)
}

db.auth.getSession().then(({ data: { session } }) => {
  if (session) window.location.href = 'home.html'
})
</script>
</body>
</html>
