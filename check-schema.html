<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Check Supabase Schema</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      font-family: monospace;
      padding: 20px;
      background: #1a1a2e;
      color: #a6e3a1;
    }

    pre {
      background: #1e1e2e;
      padding: 15px;
      border-radius: 8px;
      overflow-x: auto;
    }

    .error {
      color: #f38ba8;
    }

    .success {
      color: #a6e3a1;
    }

    h1 {
      color: #89b4fa;
    }
  </style>
</head>

<body>
  <h1>Supabase Schema Checker</h1>
  <div id="output">Checking schema...</div>

  <script>
    const SUPABASE_URL = 'https://fyahebgkacjsxmiwteny.supabase.co'
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ5YWhlYmdrYWNqc3htaXd0ZW55Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAyNTg3NDEsImV4cCI6MjA4NTgzNDc0MX0.eIAWIPzB6EjW7rPKHLSsc2ryUBQ7yicRK1I-SxXg_2Y'
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

    async function checkSchema() {
      const output = document.getElementById('output')
      let html = ''

      // Try to insert a test row and see what columns are missing
      html += '<h2>1. Checking services table columns:</h2>'

      const testInsert = {
        vendor_id: '00000000-0000-0000-0000-000000000000',
        title: 'Test',
        description: 'Test',
        price: 0,
        category: 'test',
        location: 'test',
        time: 'test',
        contact: 'test@test.com',
        whatsapp: '123',
        telegram: 'test',
        image: 'http://test.com',
        type: 'offered',
        status: 'active'
      }

      const { data, error } = await db.from('services').insert(testInsert)

      if (error) {
        html += '<pre class="error">Error inserting: ' + error.message + '</pre>'
        html += '<p>Missing columns detected. Try this SQL in Supabase SQL Editor:</p>'
        html += '<pre>' + getFixSQL() + '</pre>'
      } else {
        html += '<pre class="success">Insert successful! Columns are correct.</pre>'
      }

      // Get table info using RPC or information_schema
      html += '<h2>2. All tables in database:</h2>'
      const { data: tables } = await db
        .from('information_schema.tables')
        .select('table_name')
        .eq('table_schema', 'public')

      if (tables) {
        html += '<pre>' + JSON.stringify(tables, null, 2) + '</pre>'
      }

      output.innerHTML = html
    }

    function getFixSQL() {
      return `-- Run this in Supabase SQL Editor to create/fix the services table
CREATE TABLE IF NOT EXISTS services (
  id uuid PRIMARY KEY DEFAULT gen_random_uuid(),
  vendor_id uuid REFERENCES auth.users(id) ON DELETE CASCADE,
  title text NOT NULL,
  description text,
  price numeric DEFAULT 0,
  category text,
  location text,
  time text,
  contact text,
  whatsapp text,
  telegram text,
  image text,
  type text DEFAULT 'offered',
  status text DEFAULT 'active',
  created_at timestamptz DEFAULT now()
);

-- Create index for faster queries
CREATE INDEX IF NOT EXISTS idx_services_type ON services(type);
CREATE INDEX IF NOT EXISTS idx_services_status ON services(status);
CREATE INDEX IF NOT EXISTS idx_services_vendor ON services(vendor_id);
`
    }

    checkSchema()
  </script>
</body>

</html>
