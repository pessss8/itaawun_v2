<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Services Offered - IT'aawun</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: linear-gradient(-45deg, #00008B, #ffffff, #3F00FF);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      color: #333;
    }

    @keyframes gradientBG {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    header {
      background: rgba(0, 0, 0, 0.2);
      color: white;
      padding: 15px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header .logo {
      font-size: 22px;
      font-weight: bold;
      cursor: pointer;
      color: white;
    }

    .profile-container {
      position: relative;
    }

    .profile-pic {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid white;
      transition: transform 0.2s;
    }

    .profile-container:hover .profile-pic {
      transform: scale(1.1);
    }

    .dropdown {
      display: none;
      position: absolute;
      right: 0;
      top: 50px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      z-index: 100;
      min-width: 150px;
      overflow: hidden;
    }

    .profile-container:hover .dropdown {
      display: block;
    }

    .dropdown a {
      display: block;
      padding: 10px 15px;
      text-decoration: none;
      color: #333;
      font-size: 14px;
    }

    .dropdown a:hover {
      background: #f5f0ff;
      color: #6b21a8;
    }

    .back-button {
      padding: 10px 40px;
      display: flex;
      align-items: center;
      cursor: pointer;
      font-weight: bold;
      color: #001f3f;
      font-size: 16px;
    }

    .back-button i {
      margin-right: 8px;
    }

    .back-button:hover {
      color: #004f80;
    }

    .page-title {
      text-align: center;
      padding: 20px;
      color: #001f3f;
      font-size: 28px;
      font-weight: bold;
      text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.7);
    }

    .filters {
      text-align: center;
      margin-bottom: 20px;
      position: relative;
    }

    .filter-button {
      padding: 12px 20px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: #001f3f;
      color: white;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .filter-button:hover {
      background: #004f80;
    }

    .filter-popup {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      border-radius: 12px;
      padding: 20px 25px;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
      z-index: 300;
      text-align: center;
    }

    .filter-popup h3 {
      margin-bottom: 15px;
      color: #001f3f;
    }

    .filter-popup select {
      padding: 10px;
      font-size: 14px;
      margin: 8px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
      width: 80%;
    }

    .filter-popup button {
      margin-top: 10px;
      padding: 10px 18px;
      font-size: 14px;
      border: none;
      border-radius: 6px;
      background: #001f3f;
      color: white;
      cursor: pointer;
    }

    .filter-popup button:hover {
      background: #004f80;
    }

    .search-bar {
      text-align: center;
      margin-bottom: 20px;
    }

    .search-bar input {
      padding: 10px;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #ccc;
      width: 60%;
    }

    .search-bar button {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      background: #001f3f;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    .search-bar button:hover {
      background: #004f80;
    }

    .service-list {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding: 20px;
    }

    .service-card {
      background: rgba(255, 255, 255, 0.95);
      max-width: 300px;
      width: 100%;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
      overflow: hidden;
      transition: transform .3s;
      display: flex;
      flex-direction: column;
    }

    .service-card:hover {
      transform: scale(1.03);
    }

    .service-card img {
      width: 100%;
      height: 120px;
      object-fit: cover;
    }

    .offerer {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px 0 12px;
    }

    .offerer img {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      object-fit: cover;
      border: 1.5px solid #001f3f;
    }

    .offerer span {
      font-size: 13px;
      font-weight: 600;
      color: #001f3f;
    }

    .service-card .content {
      padding: 12px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .service-card h3 {
      font-size: 16px;
      margin: 5px 0;
      color: #001f3f;
    }

    .service-card p.desc {
      font-size: 13px;
      margin: 5px 0;
      color: #555;
      overflow: hidden;
      max-height: 38px;
      transition: max-height 0.4s ease;
    }

    .service-card p.desc.expanded {
      max-height: 300px;
    }

    .service-card .extra-info {
      font-size: 11px;
      color: #555;
      margin: 5px 0;
    }

    .service-card .moreBtn {
      background: none;
      border: none;
      color: grey;
      font-weight: bold;
      cursor: pointer;
      padding: 0;
      margin: 3px 0;
      text-align: left;
      font-size: 12px;
    }

    .service-card span.price {
      font-weight: bold;
      color: #333;
      margin-top: 5px;
      display: block;
      font-size: 14px;
    }

    /* TWO buttons at the bottom of each card */
    .card-actions {
      display: flex;
      gap: 8px;
      margin-top: auto;
      padding-top: 8px;
    }

    .service-card button.orderBtn {
      flex: 1;
      padding: 9px 8px;
      border: none;
      border-radius: 6px;
      background: #001f3f;
      color: white;
      cursor: pointer;
      font-weight: bold;
      font-size: 13px;
      transition: .3s;
    }

    .service-card button.orderBtn:hover {
      background: #004f80;
    }

    .service-card button.bookBtn {
      flex: 1;
      padding: 9px 8px;
      border: none;
      border-radius: 6px;
      background: #6b21a8;
      color: white;
      cursor: pointer;
      font-weight: bold;
      font-size: 13px;
      transition: .3s;
    }

    .service-card button.bookBtn:hover {
      background: #581c87;
    }

    .service-card button.bookBtn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Star rating display */
    .star-display {
      font-size: 12px;
      color: #f59e0b;
      margin: 3px 0 1px;
    }

    /* Contact Modal (existing) */
    #serviceModal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 200;
    }

    #serviceModal .modal-content {
      background: white;
      max-width: 500px;
      margin: 50px auto;
      padding: 25px;
      border-radius: 12px;
      position: relative;
      text-align: center;
    }

    #serviceModal .close {
      position: absolute;
      top: 10px;
      right: 15px;
      font-size: 28px;
      cursor: pointer;
    }

    #serviceModal .contact-btn {
      padding: 12px 20px;
      margin: 10px 5px;
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: .3s;
    }

    #emailBtn {
      background: #ff6b6b;
    }

    #emailBtn:hover {
      background: #ff4c4c;
    }

    #whatsappBtn {
      background: #25d366;
    }

    #whatsappBtn:hover {
      background: #1ebe57;
    }

    #telegramBtn {
      background: #0088cc;
    }

    #telegramBtn:hover {
      background: #0077b3;
    }

    /* Book Modal */
    #bookModal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 200;
    }

    #bookModal .modal-content {
      background: white;
      max-width: 420px;
      margin: 80px auto;
      padding: 25px;
      border-radius: 12px;
      position: relative;
      text-align: center;
    }

    #bookModal h3 {
      color: #001f3f;
      margin-bottom: 12px;
    }

    #bookModal textarea {
      width: 90%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
      resize: none;
      font-family: 'Segoe UI', sans-serif;
    }

    #bookModal .btn-confirm {
      width: 100%;
      padding: 12px;
      background: #6b21a8;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 12px;
      transition: 0.2s;
    }

    #bookModal .btn-confirm:hover {
      background: #581c87;
    }

    #bookModal .btn-confirm:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    footer {
      background: rgba(0, 0, 0, 0.2);
      color: white;
      text-align: center;
      padding: 15px;
      margin-top: 20px;
    }

    @media(max-width:600px) {
      .search-bar input {
        width: 80%;
      }

      .service-list {
        gap: 15px;
        justify-content: center;
      }

      .service-card {
        max-width: 90%;
      }
    }
  </style>
</head>

<body>

  <header>
    <div class="logo" onclick="window.location.href='home.html'">IT'aawun</div>
    <div class="profile-container">
      <img src="assets/images/ipey.jpeg" class="profile-pic" id="profilePic">
      <div class="dropdown">
        <a href="profile.html">👤 My Profile</a>
        <a href="bookings.html">📋 My Bookings</a>
        <a href="#" onclick="doLogout()" style="color:#dc2626">🚪 Logout</a>
      </div>
    </div>
  </header>

  <div class="back-button" onclick="window.location.href='home.html'">
    <i class="fa-solid fa-arrow-left"></i> Back
  </div>

  <div class="page-title">Services Offered</div>

  <div class="filters">
    <button class="filter-button" onclick="toggleFilterPopup()">Filter <i class="fa-solid fa-filter"></i></button>
    <div id="filterPopup" class="filter-popup">
      <h3>Filter by Category & Price</h3>
      <select id="categoryFilter">
        <option value="all">All Categories</option>
        <option value="runner">Runner</option>
        <option value="service">Service</option>
      </select>
      <select id="priceFilter">
        <option value="all">All Prices</option>
        <option value="under2">Under RM2</option>
        <option value="2to5">RM2 - RM5</option>
        <option value="above10">Above RM10</option>
      </select>
      <button onclick="applyFilters()">Apply</button>
    </div>
  </div>

  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search services...">
    <button onclick="searchServices()">Search</button>
  </div>

  <div class="service-list" id="serviceList">
    <div class="empty-state" style="text-align:center;padding:40px;color:#001f3f;">Loading services...</div>
  </div>

  <!-- Contact Modal (unchanged from original) -->
  <div id="serviceModal">
    <div class="modal-content">
      <span class="close" onclick="closeModal()">&times;</span>
      <h3 id="modalTitle"></h3>
      <p id="modalDesc"></p>
      <p id="modalPrice"></p>
      <div>
        <button id="emailBtn" class="contact-btn" onclick="contactEmail()">📧 Email</button>
        <button id="whatsappBtn" class="contact-btn" onclick="contactWhatsApp()">💬 WhatsApp</button>
        <button id="telegramBtn" class="contact-btn" onclick="contactTelegram()">✈️ Telegram</button>
      </div>
    </div>
  </div>

  <!-- Book Modal (NEW) -->
  <div id="bookModal">
    <div class="modal-content">
      <span class="close" onclick="closeBookModal()">&times;</span>
      <h3 id="bookModalTitle"></h3>
      <p style="font-size:14px;color:#555;margin-bottom:12px">Add a note for the vendor (optional):</p>
      <textarea id="bookNote" rows="3" placeholder="e.g. I need this by Thursday, room B204..."></textarea>
      <button class="btn-confirm" id="btnConfirmBook" onclick="confirmBook()">✓ Confirm Booking</button>
    </div>
  </div>

  <footer>&copy; 2025 IT'aawun. All rights reserved.</footer>

  <script>
    const SUPABASE_URL = 'https://fyahebgkacjsxmiwteny.supabase.co'
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ5YWhlYmdrYWNqc3htaXd0ZW55Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAyNTg3NDEsImV4cCI6MjA4NTgzNDc0MX0.eIAWIPzB6EjW7rPKHLSsc2ryUBQ7yicRK1I-SxXg_2Y'
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

    let currentUser = null
    let pendingBook = { serviceId: null, vendorId: null, title: '' }
    let allServices = [] // Store loaded services for filtering

    // Auth check
    db.auth.getSession().then(({ data: { session } }) => {
      if (!session) { window.location.href = 'index.html'; return }
      currentUser = session.user
      loadServices()
    })

    // ── Load services from Supabase ──────────────────────
    async function loadServices() {
      const { data, error } = await db
        .from('services')
        .select('*')
        .eq('status', 'active')
        .eq('service_type', 'offered')
        .order('created_at', { ascending: false })

      const container = document.getElementById('serviceList')
      if (error || !data || data.length === 0) {
        container.innerHTML = '<div class="empty-state" style="text-align:center;padding:40px;color:#001f3f;">No services available yet. Be the first to offer!</div>'
        return
      }

      allServices = data

      // Fetch vendor names and avatars
      const vendorIds = [...new Set(data.map(s => s.vendor_id))]
      const { data: profiles } = await db.from('profiles').select('id, full_name, avatar_url').in('id', vendorIds)
      const profileMap = {}
      if (profiles) profiles.forEach(p => { profileMap[p.id] = p })

      renderServices(data, profileMap)
    }

    function renderServices(services, profileMap) {
      const container = document.getElementById('serviceList')
      if (services.length === 0) {
        container.innerHTML = '<div class="empty-state" style="text-align:center;padding:40px;color:#001f3f;">No services found.</div>'
        return
      }

      container.innerHTML = services.map(s => {
        const vendor = profileMap[s.vendor_id] || {}
        const vendorName = vendor.full_name || 'Vendor'
        const avatar = vendor.avatar_url || 'assets/images/OIP.jpg'
        const category = s.category || 'service'
        const priceVal = parseFloat(s.price) || 0

        return `
        <div class="service-card" data-category="${category}" data-price="${priceVal}">
          <img src="${s.image_url || 'https://via.placeholder.com/300x120'}" onerror="this.src='https://via.placeholder.com/300x120'">
          <div class="offerer"><img src="${avatar}" alt="profile" onerror="this.src='assets/images/OIP.jpg'"><span>${escapeHtml(vendorName)}</span></div>
          <div class="content">
            <h3>${escapeHtml(s.title)}</h3>
            <p class="desc">${escapeHtml(s.description || '')}</p>
            <button class="moreBtn" onclick="toggleDesc(this)">More</button>
            <div class="extra-info">
              <p><strong>Location:</strong> ${escapeHtml(s.location || '—')}</p>
              <p><strong>Available Time:</strong> ${escapeHtml(s.available_time || '—')}</p>
            </div>
            <span class="price">RM${priceVal.toFixed(2)}</span>
            <div class="card-actions">
              <button class="orderBtn" onclick="openModal('${escapeJs(s.title)}','${escapeJs(s.description || '')}','RM${priceVal.toFixed(2)}','${escapeJs(s.contact_email || '')}','${escapeJs(s.telegram || '')}','${escapeJs(s.whatsapp || '')}')">Contact</button>
              <button class="bookBtn" onclick="openBookModal('${escapeJs(s.title)}','${s.id}','${s.vendor_id}')">📋 Book</button>
            </div>
          </div>
        </div>`
      }).join('')
    }

    function escapeHtml(text) {
      if (!text) return ''
      return String(text).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;')
    }
    function escapeJs(text) {
      if (!text) return ''
      return String(text).replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '\\"')
    }

    // ── Filter & Search functions ────────────────────────
    function toggleDesc(btn) {
      const desc = btn.previousElementSibling
      desc.classList.toggle('expanded')
      btn.textContent = desc.classList.contains('expanded') ? 'Less' : 'More'
    }

    function toggleFilterPopup() {
      const f = document.getElementById('filterPopup')
      f.style.display = (f.style.display === 'block') ? 'none' : 'block'
    }

    function applyFilters() {
      filterServices()
      document.getElementById('filterPopup').style.display = 'none'
    }

    window.addEventListener('click', function (e) {
      const popup = document.getElementById('filterPopup')
      const btn = document.querySelector('.filter-button')
      if (popup.style.display === 'block' && !popup.contains(e.target) && e.target !== btn) {
        popup.style.display = 'none'
      }
    })

    function filterServices() {
      const cat = document.getElementById('categoryFilter').value
      const price = document.getElementById('priceFilter').value

      let filtered = allServices.filter(s => {
        const category = s.category || 'service'
        const p = parseFloat(s.price) || 0

        if (cat !== 'all' && category !== cat) return false
        if (price === 'under2' && p >= 2) return false
        if (price === '2to5' && (p < 2 || p > 5)) return false
        if (price === 'above10' && p <= 10) return false
        return true
      })

      // Re-render with filtered results
      db.from('profiles').select('id, full_name, avatar_url')
        .in('id', [...new Set(filtered.map(s => s.vendor_id))])
        .then(({ data }) => {
          const profileMap = {}
          if (data) data.forEach(p => { profileMap[p.id] = p })
          renderServices(filtered, profileMap)
        })
    }

    function searchServices() {
      const term = document.getElementById('searchInput').value.toLowerCase().trim()
      if (!term) { loadServices(); return }

      let filtered = allServices.filter(s =>
        (s.title && s.title.toLowerCase().includes(term)) ||
        (s.description && s.description.toLowerCase().includes(term))
      )

      db.from('profiles').select('id, full_name, avatar_url')
        .in('id', [...new Set(filtered.map(s => s.vendor_id))])
        .then(({ data }) => {
          const profileMap = {}
          if (data) data.forEach(p => { profileMap[p.id] = p })
          renderServices(filtered, profileMap)
        })
    }

    // ── Modal functions ──────────────────────────────────
    let modalData = { email: '', whatsapp: '', telegram: '' }
    function openModal(title, desc, price, email, telegram, whatsapp) {
      modalData = { email, telegram, whatsapp }
      document.getElementById('modalTitle').textContent = title
      document.getElementById('modalDesc').textContent = desc
      document.getElementById('modalPrice').textContent = price
      document.getElementById('serviceModal').style.display = 'block'
    }
    function closeModal() { document.getElementById('serviceModal').style.display = 'none' }
    function contactEmail() { window.location.href = 'mailto:' + modalData.email }
    function contactWhatsApp() { window.open('https://wa.me/' + modalData.whatsapp, '_blank') }
    function contactTelegram() { window.open('https://t.me/' + modalData.telegram, '_blank') }

    // ── Book Modal ───────────────────────────────────────
    function openBookModal(title, serviceId, vendorId) {
      if (!currentUser) { window.location.href = 'index.html'; return }
      pendingBook = { serviceId, vendorId, title }
      document.getElementById('bookModalTitle').textContent = 'Book: ' + title
      document.getElementById('bookNote').value = ''
      document.getElementById('bookModal').style.display = 'block'
    }
    function closeBookModal() { document.getElementById('bookModal').style.display = 'none' }

    async function confirmBook() {
      const note = document.getElementById('bookNote').value.trim()
      const btn = document.getElementById('btnConfirmBook')
      btn.disabled = true
      btn.textContent = 'Sending...'

      const { error } = await db.from('bookings').insert({
        service_id: pendingBook.serviceId,
        student_id: currentUser.id,
        vendor_id: pendingBook.vendorId,
        note: note,
        status: 'pending'
      })

      btn.disabled = false
      btn.textContent = '✓ Confirm Booking'

      if (error) { alert('Booking failed: ' + error.message); return }
      closeBookModal()
      alert('✅ Booking sent! The vendor will respond soon. Check "My Bookings" to track it.')
    }

    async function doLogout() {
      const { error } = await db.auth.signOut()
      if (error) { console.error('Logout error:', error) }
      window.location.replace('index.html?logged=out')
    }
  </script>
</body>

</html>
