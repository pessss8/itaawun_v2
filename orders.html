<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Orders — iTa'awun</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green:       #1D9E75;
    --green-light: #e8f7f2;
    --green-dark:  #15785a;
    --gray-50:     #f9fafb;
    --gray-100:    #f3f4f6;
    --gray-200:    #e5e7eb;
    --gray-400:    #9ca3af;
    --gray-500:    #6b7280;
    --gray-600:    #4b5563;
    --gray-900:    #111827;
    --red:         #ef4444;
    --radius:      12px;
    --shadow:      0 1px 3px rgba(0,0,0,.08);
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--gray-50); color: var(--gray-900); min-height: 100vh; padding-bottom: 80px; }

  /* ── HEADER ── */
  .header { background: #fff; border-bottom: 1px solid var(--gray-200); padding: 0 1rem; height: 52px; display: flex; align-items: center; gap: .75rem; position: sticky; top: 0; z-index: 100; }
  .back-btn { color: var(--gray-600); text-decoration: none; font-size: .9rem; flex-shrink: 0; }
  .header-title { font-size: 1rem; font-weight: 700; flex: 1; }

  /* ── FILTER TABS ── */
  .tabs-wrap { background: #fff; border-bottom: 1px solid var(--gray-200); position: sticky; top: 52px; z-index: 90; }
  .tabs { display: flex; overflow-x: auto; scrollbar-width: none; padding: 0 1rem; gap: 0; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex-shrink: 0; padding: .75rem .9rem;
    font-size: .85rem; font-weight: 500; color: var(--gray-500);
    border-bottom: 2px solid transparent;
    cursor: pointer; white-space: nowrap;
    transition: color .15s, border-color .15s;
    background: none; border-top: none; border-left: none; border-right: none;
    font-family: inherit;
  }
  .tab:hover { color: var(--gray-900); }
  .tab.active { color: var(--green); border-bottom-color: var(--green); font-weight: 600; }
  .tab .count { display: inline-flex; align-items: center; justify-content: center; background: var(--gray-200); color: var(--gray-600); font-size: .68rem; font-weight: 600; border-radius: 100px; padding: .05rem .35rem; margin-left: .3rem; min-width: 18px; line-height: 1.4; }
  .tab.active .count { background: var(--green-light); color: var(--green-dark); }

  /* ── ORDER LIST ── */
  .list-wrap { padding: .85rem 1rem; display: flex; flex-direction: column; gap: .5rem; }

  .order-card {
    background: #fff;
    border: 1px solid var(--gray-200);
    border-radius: var(--radius);
    padding: .85rem;
    display: flex; align-items: flex-start; gap: .75rem;
    text-decoration: none; color: inherit;
    transition: box-shadow .1s, border-color .1s;
  }
  .order-card:hover { box-shadow: var(--shadow); border-color: var(--gray-300); }

  .order-thumb {
    width: 48px; height: 48px; border-radius: 9px;
    background: var(--gray-100); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.3rem; overflow: hidden;
  }
  .order-thumb img { width: 100%; height: 100%; object-fit: cover; }

  .order-body { flex: 1; min-width: 0; }
  .order-name { font-size: .875rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: .2rem; }
  .order-meta { font-size: .75rem; color: var(--gray-400); }
  .order-meta .sep { margin: 0 .25rem; }

  .order-right { display: flex; flex-direction: column; align-items: flex-end; gap: .35rem; flex-shrink: 0; }
  .order-amount { font-size: .875rem; font-weight: 700; color: var(--gray-900); }

  /* ── STATUS BADGES ── */
  .status-badge {
    display: inline-flex; align-items: center; gap: .25rem;
    font-size: .7rem; font-weight: 600; padding: .2rem .55rem;
    border-radius: 100px; letter-spacing: .02em; white-space: nowrap;
  }
  .badge-pending    { background: #fef3c7; color: #92400e; }
  .badge-confirmed  { background: #dbeafe; color: #1e40af; }
  .badge-in_progress{ background: #dcfce7; color: #166534; }
  .badge-ready      { background: var(--green-light); color: var(--green-dark); }
  .badge-completed  { background: var(--gray-100); color: var(--gray-500); }
  .badge-cancelled  { background: #fee2e2; color: #991b1b; }
  .badge-disputed   { background: #fff7ed; color: #9a3412; }

  /* ── EMPTY STATE ── */
  .empty-state { text-align: center; padding: 3.5rem 1.5rem 2rem; }
  .empty-icon { font-size: 2.5rem; margin-bottom: .75rem; }
  .empty-title { font-size: .95rem; font-weight: 600; margin-bottom: .4rem; }
  .empty-sub { font-size: .85rem; color: var(--gray-400); line-height: 1.6; }
  .empty-cta { display: inline-block; margin-top: 1rem; padding: .65rem 1.25rem; background: var(--green); color: #fff; border-radius: 10px; text-decoration: none; font-size: .875rem; font-weight: 600; }

  /* ── ACTION-NEEDED INDICATOR ── */
  .action-dot { width: 7px; height: 7px; background: var(--green); border-radius: 50%; flex-shrink: 0; margin-top: 4px; }

  /* ── SKELETON ── */
  .skeleton { background: linear-gradient(90deg, var(--gray-100) 25%, var(--gray-200) 50%, var(--gray-100) 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 8px; }
  @keyframes shimmer { to { background-position: -200% 0; } }

  /* ── BOTTOM NAV ── */
  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid var(--gray-200); display: flex; height: 60px; z-index: 100; }
  .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; text-decoration: none; color: var(--gray-400); font-size: .65rem; font-weight: 500; transition: color .15s; position: relative; }
  .nav-item.active { color: var(--green); }
  .nav-icon { font-size: 1.2rem; line-height: 1; }
  .nav-badge { position: absolute; top: 7px; right: calc(50% - 18px); background: var(--red); color: #fff; font-size: .6rem; font-weight: 700; border-radius: 100px; padding: .05rem .3rem; min-width: 16px; text-align: center; }

  #toast { display: none; position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%); background: var(--gray-900); color: #fff; padding: .65rem 1.25rem; border-radius: 8px; font-size: .85rem; z-index: 999; max-width: 88vw; text-align: center; }
</style>
</head>
<body>

<header class="header">
  <a class="back-btn" href="home.html">&#8592;</a>
  <div class="header-title">My Orders</div>
</header>

<div class="tabs-wrap">
  <div class="tabs" id="tabs">
    <button class="tab active" data-tab="active" onclick="switchTab('active')">Active <span class="count" id="count-active">—</span></button>
    <button class="tab" data-tab="all"    onclick="switchTab('all')">All <span class="count" id="count-all">—</span></button>
    <button class="tab" data-tab="completed" onclick="switchTab('completed')">Completed <span class="count" id="count-completed">—</span></button>
    <button class="tab" data-tab="cancelled" onclick="switchTab('cancelled')">Cancelled <span class="count" id="count-cancelled">—</span></button>
  </div>
</div>

<div class="list-wrap" id="list-wrap">
  <!-- skeleton -->
  ${[1,2,3].map(() => `
  <div style="background:#fff;border:1px solid var(--gray-200);border-radius:12px;padding:.85rem;display:flex;gap:.75rem;align-items:flex-start">
    <div class="skeleton" style="width:48px;height:48px;border-radius:9px;flex-shrink:0"></div>
    <div style="flex:1">
      <div class="skeleton" style="height:14px;width:65%;margin-bottom:.35rem"></div>
      <div class="skeleton" style="height:11px;width:45%"></div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:.35rem">
      <div class="skeleton" style="height:14px;width:55px"></div>
      <div class="skeleton" style="height:18px;width:65px;border-radius:100px"></div>
    </div>
  </div>`).join('')}
</div>

<!-- Bottom nav -->
<nav class="bottom-nav">
  <a class="nav-item" href="home.html"><span class="nav-icon">🏠</span>Home</a>
  <a class="nav-item" href="vendors.html"><span class="nav-icon">🏪</span>Vendors</a>
  <a class="nav-item active" href="orders.html"><span class="nav-icon">📋</span>Orders</a>
  <a class="nav-item" href="profile.html"><span class="nav-icon">👤</span>Profile</a>
</nav>

<div id="toast"></div>

<script>
const CATEGORY_COLORS = {
  food_drinks:{bg:'#fff7ed',emoji:'🍱'}, runner:{bg:'#eff6ff',emoji:'🏃'},
  printing:{bg:'#f3f4f6',emoji:'🖨️'}, cleaning:{bg:'#ecfdf5',emoji:'🧹'},
  laundry:{bg:'#f5f3ff',emoji:'👕'}, delivery:{bg:'#fffbeb',emoji:'📦'},
  tutoring:{bg:'#fef2f2',emoji:'📚'}, design:{bg:'#fdf2f8',emoji:'🎨'},
  coding:{bg:'#f0fdfa',emoji:'💻'}, photography:{bg:'#fff7ed',emoji:'📷'},
  repair:{bg:'#eef2ff',emoji:'🔧'}, sell_product:{bg:'#f7fee7',emoji:'🛍️'},
  other:{bg:'#f3f4f6',emoji:'📌'}
}

const STATUS_LABELS = {
  pending: 'Pending', confirmed: 'Confirmed', in_progress: 'In Progress',
  ready: 'Ready', completed: 'Completed', cancelled: 'Cancelled', disputed: 'Disputed'
}
const STATUS_EMOJI = {
  pending: '⏳', confirmed: '✅', in_progress: '🔄',
  ready: '📦', completed: '🎉', cancelled: '✖️', disputed: '⚠️'
}

// Tabs map to status groups
const TAB_STATUSES = {
  active:    ['pending', 'confirmed', 'in_progress', 'ready'],
  all:       null, // all statuses
  completed: ['completed'],
  cancelled: ['cancelled', 'disputed']
}

let allOrders  = []
let activeTab  = 'active'

async function init() {
  const session = await requireAuth()
  if (!session) return

  const { data, error } = await db.from('orders')
    .select(`
      id, status, quantity, total_amount, created_at, payment_method,
      products(id, name, image_url, category),
      vendors(id, shop_name)
    `)
    .eq('buyer_id', session.user.id)
    .order('created_at', { ascending: false })

  if (error) {
    document.getElementById('list-wrap').innerHTML =
      '<div class="empty-state"><div class="empty-title">Failed to load orders</div><div class="empty-sub">Please try again.</div></div>'
    return
  }

  allOrders = data || []
  updateCounts()
  renderTab(activeTab)
}

function updateCounts() {
  Object.entries(TAB_STATUSES).forEach(([tab, statuses]) => {
    const n = statuses
      ? allOrders.filter(o => statuses.includes(o.status)).length
      : allOrders.length
    const el = document.getElementById('count-' + tab)
    if (el) el.textContent = n > 0 ? n : '0'
  })
}

function switchTab(tab) {
  activeTab = tab
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === tab)
  })
  renderTab(tab)
}

function renderTab(tab) {
  const statuses = TAB_STATUSES[tab]
  const filtered = statuses ? allOrders.filter(o => statuses.includes(o.status)) : allOrders
  const wrap = document.getElementById('list-wrap')

  if (filtered.length === 0) {
    const emptyMessages = {
      active:    { icon: '📋', title: 'No active orders', sub: 'Orders you\'ve placed will appear here while they\'re being processed.' },
      all:       { icon: '🛍️', title: 'No orders yet', sub: 'Browse vendors and place your first order!' },
      completed: { icon: '🎉', title: 'No completed orders', sub: 'Completed orders will appear here.' },
      cancelled: { icon: '✖️', title: 'No cancelled orders', sub: 'Cancelled or disputed orders will appear here.' }
    }
    const msg = emptyMessages[tab]
    wrap.innerHTML = `<div class="empty-state">
      <div class="empty-icon">${msg.icon}</div>
      <div class="empty-title">${msg.title}</div>
      <div class="empty-sub">${msg.sub}</div>
      ${tab === 'all' || tab === 'active' ? '<a class="empty-cta" href="vendors.html">Browse Vendors</a>' : ''}
    </div>`
    return
  }

  wrap.innerHTML = filtered.map(o => {
    const cat   = o.products?.category || 'other'
    const col   = CATEGORY_COLORS[cat] || CATEGORY_COLORS.other
    const thumb = o.products?.image_url
      ? `<img src="${o.products.image_url}" alt="${o.products?.name}">`
      : col.emoji
    const date  = new Date(o.created_at).toLocaleDateString('en-MY', { day: 'numeric', month: 'short' })
    const needsAction = o.status === 'ready'

    return `<a class="order-card" href="order-detail.html?id=${o.id}">
      <div class="order-thumb" style="background:${col.bg}">${thumb}</div>
      <div class="order-body">
        <div class="order-name">${o.products?.name || 'Order'}</div>
        <div class="order-meta">
          ${o.vendors?.shop_name || ''}
          <span class="sep">·</span>
          Qty ${o.quantity}
          <span class="sep">·</span>
          ${date}
        </div>
      </div>
      <div class="order-right">
        <div class="order-amount">RM ${parseFloat(o.total_amount).toFixed(2)}</div>
        <span class="status-badge badge-${o.status}">${STATUS_EMOJI[o.status] || ''} ${STATUS_LABELS[o.status] || o.status}</span>
        ${needsAction ? '<div class="action-dot" title="Action needed"></div>' : ''}
      </div>
    </a>`
  }).join('')
}

init()
</script>
</body>
</html>
