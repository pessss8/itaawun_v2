<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IT'aawun - Home</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      color: #fff;
      background: linear-gradient(-45deg, #00008B, #ffffff, #3F00FF);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
    }
    @keyframes gradientBG {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Header */
    header {
      background: rgba(0,0,0,0.2);
      color: white;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }
    header .logo {
      font-size: 24px; font-weight: bold;
      text-decoration: none; cursor: pointer;
    }
    nav a {
      color: white; margin: 0 15px;
      text-decoration: none; font-weight: 500;
    }
    nav a:hover { text-decoration: underline; }

    /* Profile dropdown — hover-based, no JS needed */
    .profile-container {
      position: relative;
      display: inline-block;
    }
    .profile-pic {
      width: 40px; height: 40px;
      border-radius: 50%; cursor: pointer;
      border: 2px solid white;
      transition: transform 0.2s, box-shadow 0.2s;
      display: block;
    }
    /* Hover effect on profile pic */
    .profile-container:hover .profile-pic {
      transform: scale(1.1);
      box-shadow: 0 0 0 3px rgba(255,255,255,0.5);
    }
    .dropdown {
      display: none;
      position: absolute;
      right: 0; top: 48px;
      background: white; color: #333;
      border-radius: 10px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.25);
      min-width: 160px;
      z-index: 100;
      overflow: hidden;
      /* Smooth appear */
      animation: fadeIn 0.15s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    /* Show dropdown on hover */
    .profile-container:hover .dropdown { display: block; }
    /* Keep open when hovering the dropdown itself */
    .dropdown:hover { display: block; }
    .dropdown a {
      display: block; padding: 11px 16px;
      text-decoration: none; color: #333; font-size: 14px;
      transition: background 0.15s;
    }
    .dropdown a:hover { background: #f5f0ff; color: #6b21a8; }
    .dropdown .divider { border: none; border-top: 1px solid #eee; margin: 0; }
    .dropdown .logout-link { color: #dc2626 !important; }
    .dropdown .logout-link:hover { background: #fef2f2 !important; }

    /* Hero */
    .hero {
      flex: 1; display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      text-align: center; padding: 50px 20px;
    }
    .hero h1 {
      font-size: 42px; margin-bottom: 20px;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.3); color: #ffffff;
    }
    .hero p {
      font-size: 18px; margin-bottom: 40px;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.3); color: #ffffff;
    }
    .buttons {
      display: flex; flex-wrap: wrap;
      gap: 15px; justify-content: center;
    }
    .buttons a {
      text-decoration: none; padding: 15px 30px;
      font-size: 16px; font-weight: bold;
      border-radius: 10px; transition: 0.3s;
      min-width: 160px; text-align: center;
    }
    .find-btn   { background: #D8BFFD; color: #ffffff; }
    .find-btn:hover   { background: #C29BFD; }
    .create-btn { background: #4B0082; color: white; }
    .create-btn:hover { background: #370066; }
    .needed-btn { background: #8A2BE2; color: white; }
    .needed-btn:hover { background: #7326C8; }

    footer {
      background: rgba(0,0,0,0.2); color: white;
      text-align: center; padding: 15px;
    }

    @media (max-width: 600px) {
      .hero h1 { font-size: 28px; }
      .hero p  { font-size: 16px; }
      header   { flex-direction: column; align-items: flex-start; }
      .profile-container { align-self: flex-end; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo" onclick="window.location.href='home.html'">IT'aawun</div>
    <div class="profile-container">
      <img src="assets/images/ipey.jpeg" alt="Profile" class="profile-pic" id="profilePic">
      <div class="dropdown">
        <a href="profile.html">👤 My Profile</a>
        <hr class="divider">
        <a href="#" class="logout-link" onclick="doLogout()">🚪 Logout</a>
      </div>
    </div>
  </header>

  <section class="hero">
    <h1>Welcome to IT'aawun</h1>
    <p>A freelance platform specifically for CFS IIUM students</p>
    <div class="buttons">
      <a href="find.html"   class="find-btn">Service Offered</a>
      <a href="needed.html" class="needed-btn">Service Needed</a>
      <a href="create.html" class="create-btn">Create Service</a>
    </div>
  </section>

  <footer>
    <p>© 2025 IT'aawun | Student Freelance Collaboration</p>
  </footer>

  <script>
    const SUPABASE_URL = 'https://fyahebgkacjsxmiwteny.supabase.co'
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ5YWhlYmdrYWNqc3htaXd0ZW55Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAyNTg3NDEsImV4cCI6MjA4NTgzNDc0MX0.eIAWIPzB6EjW7rPKHLSsc2ryUBQ7yicRK1I-SxXg_2Y'
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

    // Protect page — redirect to login if not logged in
    db.auth.getSession().then(({ data: { session } }) => {
      if (!session) window.location.href = 'index.html'
    })

    // Load real profile picture if available
    db.auth.getUser().then(({ data: { user } }) => {
      if (!user) return
      db.from('profiles').select('avatar_url').eq('id', user.id).single()
        .then(({ data }) => {
          if (data?.avatar_url) {
            document.getElementById('profilePic').src = data.avatar_url
          }
        })
    })

    async function doLogout() {
      await db.auth.signOut()
      window.location.href = 'index.html'
    }
  </script>
</body>
</html>
