<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Service Needed - IT'aawun</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: linear-gradient(-45deg, #00008B, #ffffff, #3F00FF);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      color: #333;
    }

    @keyframes gradientBG {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    header {
      background: rgba(0, 0, 0, 0.2);
      color: white;
      padding: 15px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header .logo {
      font-size: 22px;
      font-weight: bold;
      cursor: pointer;
    }

    .profile-container {
      position: relative;
    }

    .profile-pic {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid white;
    }

    .dropdown {
      display: none;
      position: absolute;
      right: 0;
      top: 50px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      z-index: 100;
    }

    .dropdown a {
      display: block;
      padding: 10px;
      text-decoration: none;
      color: #333;
      font-size: 14px;
    }

    .dropdown a:hover {
      background: #f0f0f0;
    }

    .back-button {
      padding: 10px 40px;
      display: flex;
      align-items: center;
      cursor: pointer;
      font-weight: bold;
      color: #001f3f;
      font-size: 16px;
    }

    .back-button i {
      margin-right: 8px;
    }

    .back-button:hover {
      color: #004f80;
    }

    .page-title {
      text-align: center;
      padding: 20px;
      color: #001f3f;
      font-size: 28px;
      font-weight: bold;
      text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.7);
    }

    .filter-button {
      display: block;
      margin: 0 auto 20px auto;
      padding: 12px 20px;
      background: #001f3f;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
    }

    .filter-button:hover {
      background: #004f80;
    }

    .search-bar {
      text-align: center;
      margin-bottom: 20px;
    }

    .search-bar input {
      padding: 10px;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #ccc;
      width: 60%;
    }

    .search-bar button {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      background: #001f3f;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    .search-bar button:hover {
      background: #004f80;
    }

    .request-list {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding: 20px;
    }

    .request-card {
      background: rgba(255, 255, 255, 0.95);
      max-width: 300px;
      width: 100%;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
      overflow: hidden;
      transition: transform .3s;
      display: flex;
      flex-direction: column;
    }

    .request-card:hover {
      transform: scale(1.05);
    }

    .request-card img {
      width: 100%;
      height: 120px;
      object-fit: cover;
    }

    .requester {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px 0 12px;
    }

    .requester img {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      object-fit: cover;
      border: 1.5px solid #001f3f;
    }

    .requester span {
      font-size: 13px;
      font-weight: 600;
      color: #001f3f;
    }

    .request-card .content {
      padding: 12px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .request-card h3 {
      font-size: 16px;
      margin: 5px 0;
      color: #001f3f;
    }

    .request-card p.desc {
      font-size: 13px;
      margin: 5px 0;
      color: #555;
      overflow: hidden;
      max-height: 38px;
      transition: max-height 0.4s ease;
    }

    .request-card p.desc.expanded {
      max-height: 300px;
    }

    .request-card .extra-info {
      font-size: 11px;
      color: #555;
      margin: 5px 0;
    }

    .request-card .moreBtn {
      background: none;
      border: none;
      color: grey;
      font-weight: bold;
      cursor: pointer;
      padding: 0;
      margin: 3px 0;
      text-align: left;
      font-size: 12px;
    }

    .request-card span.price {
      font-weight: bold;
      color: #333;
      margin-top: 5px;
      display: block;
      font-size: 14px;
    }

    .request-card button.offerBtn {
      margin-top: auto;
      padding: 9px 12px;
      border: none;
      border-radius: 6px;
      background: #001f3f;
      color: white;
      cursor: pointer;
      width: 100%;
      font-weight: bold;
      font-size: 14px;
      transition: .3s;
    }

    .request-card button.offerBtn:hover {
      background: #004f80;
    }

    /* Modal */
    #requestModal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 200;
    }

    #requestModal .modal-content {
      background: white;
      max-width: 500px;
      margin: 50px auto;
      padding: 25px;
      border-radius: 12px;
      position: relative;
      text-align: center;
    }

    #requestModal .close {
      position: absolute;
      top: 10px;
      right: 15px;
      font-size: 28px;
      cursor: pointer;
    }

    #requestModal .contact-btn {
      padding: 12px 20px;
      margin: 10px 5px;
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: .3s;
    }

    #emailBtn {
      background: #ff6b6b;
    }

    #emailBtn:hover {
      background: #ff4c4c;
    }

    #whatsappBtn {
      background: #25d366;
    }

    #whatsappBtn:hover {
      background: #1ebe57;
    }

    #telegramBtn {
      background: #0088cc;
    }

    #telegramBtn:hover {
      background: #0077b3;
    }

    /* Filter Popup */
    #filterPopup {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
      z-index: 300;
      text-align: center;
    }

    #filterPopup select {
      padding: 10px;
      margin: 10px;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    #filterPopup button {
      padding: 10px 20px;
      margin-top: 15px;
      border: none;
      border-radius: 8px;
      background: #001f3f;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    #filterPopup button:hover {
      background: #004f80;
    }

    footer {
      background: rgba(0, 0, 0, 0.2);
      color: white;
      text-align: center;
      padding: 15px;
      margin-top: 20px;
    }

    @media(max-width:600px) {
      .search-bar input {
        width: 80%;
      }

      .request-list {
        gap: 15px;
        justify-content: center;
      }

      .request-card {
        max-width: 90%;
      }
    }
  </style>
</head>

<body>

  <header>
    <div class="logo" onclick="window.location.href='home.html'">IT'aawun</div>
    <div class="profile-container">
      <img src="assets/images/ipey.jpeg" class="profile-pic" id="profilePic" onclick="toggleDropdown()">
      <div class="dropdown" id="dropdownMenu">
        <a href="profile.html">My Profile</a>
        <a href="bookings.html">My Bookings</a>
        <a href="#" onclick="doLogout()" style="color:#dc2626">Logout</a>
      </div>
    </div>
  </header>

  <div class="back-button" onclick="window.location.href='home.html'">
    <i class="fa-solid fa-arrow-left"></i> Back
  </div>

  <div class="page-title">Service Needed</div>

  <button class="filter-button" onclick="toggleFilterPopup()">Filter <i class="fa-solid fa-filter"></i></button>

  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search requests...">
    <button onclick="searchRequests()">Search</button>
  </div>

  <div class="request-list" id="requestList">
    <div class="empty-state" style="text-align:center;padding:40px;color:#001f3f;">Loading requests...</div>
  </div>

  <!-- Filter Popup -->
  <div id="filterPopup">
    <h3>Filter Requests</h3>
    <select id="categoryFilter">
      <option value="all">All Categories</option>
      <option value="design">Design</option>
      <option value="coding">Coding</option>
      <option value="writing">Writing</option>
      <option value="tutoring">Tutoring</option>
      <option value="photography">Photography</option>
    </select>
    <select id="priceFilter">
      <option value="all">All Budgets</option>
      <option value="under20">Under RM20</option>
      <option value="20to50">RM20 - RM50</option>
      <option value="above50">Above RM50</option>
    </select>
    <br>
    <button onclick="applyFilter()">Apply</button>
  </div>

  <!-- Modal -->
  <div id="requestModal">
    <div class="modal-content">
      <span class="close" onclick="closeModal()">&times;</span>
      <h2 id="modalTitle"></h2>
      <p id="modalDescription"></p>
      <p><strong>Budget:</strong> <span id="modalPrice"></span></p>
      <div>
        <button id="emailBtn" class="contact-btn"><i class="fa-solid fa-envelope"></i>Email</button>
        <button id="telegramBtn" class="contact-btn"><i class="fa-brands fa-telegram"></i>Telegram</button>
        <button id="whatsappBtn" class="contact-btn"><i class="fa-brands fa-whatsapp"></i>WhatsApp</button>
      </div>
    </div>
  </div>

  <footer>
    <p>&copy; 2025 IT'aawun - All Rights Reserved</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://fyahebgkacjsxmiwteny.supabase.co'
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ5YWhlYmdrYWNqc3htaXd0ZW55Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAyNTg3NDEsImV4cCI6MjA4NTgzNDc0MX0.eIAWIPzB6EjW7rPKHLSsc2ryUBQ7yicRK1I-SxXg_2Y'
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

    let currentUser = null
    let allRequests = []

    // Auth check
    db.auth.getSession().then(({ data: { session } }) => {
      if (!session) { window.location.href = 'index.html'; return }
      currentUser = session.user
      loadRequests()
    })

    // Load profile picture
    db.auth.getUser().then(({ data: { user } }) => {
      if (!user) return
      db.from('profiles').select('avatar_url').eq('id', user.id).single()
        .then(({ data }) => {
          if (data?.avatar_url) {
            document.getElementById('profilePic').src = data.avatar_url
          }
        })
    })

    // ── Load requests from Supabase ──────────────────────
    async function loadRequests() {
      const { data, error } = await db
        .from('services')
        .select('*')
        .eq('status', 'active')
        .eq('service_type', 'needed')
        .order('created_at', { ascending: false })

      const container = document.getElementById('requestList')
      if (error || !data || data.length === 0) {
        container.innerHTML = '<div class="empty-state" style="text-align:center;padding:40px;color:#001f3f;">No service requests yet. Be the first to request!</div>'
        return
      }

      allRequests = data

      // Fetch requester names and avatars
      const requesterIds = [...new Set(data.map(r => r.vendor_id))]
      const { data: profiles } = await db.from('profiles').select('id, full_name, avatar_url').in('id', requesterIds)
      const profileMap = {}
      if (profiles) profiles.forEach(p => { profileMap[p.id] = p })

      renderRequests(data, profileMap)
    }

    function renderRequests(requests, profileMap) {
      const container = document.getElementById('requestList')
      if (requests.length === 0) {
        container.innerHTML = '<div class="empty-state" style="text-align:center;padding:40px;color:#001f3f;">No requests found.</div>'
        return
      }

      container.innerHTML = requests.map(r => {
        const requester = profileMap[r.vendor_id] || {}
        const requesterName = requester.full_name || 'Student'
        const avatar = requester.avatar_url || 'assets/images/OIP.jpg'
        const category = r.category || 'writing'
        const priceVal = parseFloat(r.price) || 0

        return `
        <div class="request-card" data-category="${category}" data-price="${priceVal}">
          <img src="${r.image_url || 'https://via.placeholder.com/300x120'}" onerror="this.src='https://via.placeholder.com/300x120'">
          <div class="requester"><img src="${avatar}" alt="profile" onerror="this.src='assets/images/OIP.jpg'"><span>${escapeHtml(requesterName)}</span></div>
          <div class="content">
            <h3>${escapeHtml(r.title)}</h3>
            <p class="desc">${escapeHtml(r.description || '')}</p>
            <button class="moreBtn" onclick="toggleDesc(this)">More</button>
            <div class="extra-info">
              <p><strong>Location:</strong> ${escapeHtml(r.location || '—')}</p>
              <p><strong>Time Needed:</strong> ${escapeHtml(r.available_time || '—')}</p>
            </div>
            <span class="price">RM${priceVal.toFixed(2)}</span>
            <button class="offerBtn" onclick="openModal('${escapeJs(r.title)}','${escapeJs(r.description || '')}','RM${priceVal.toFixed(2)}','${escapeJs(r.contact_email || '')}','${escapeJs(r.telegram || '')}','${escapeJs(r.whatsapp || '')}')">Offer Service</button>
          </div>
        </div>`
      }).join('')
    }

    function escapeHtml(text) {
      if (!text) return ''
      return String(text).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;')
    }
    function escapeJs(text) {
      if (!text) return ''
      return String(text).replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '\\"')
    }

    // Profile dropdown
    function toggleDropdown() { document.getElementById("dropdownMenu").style.display = document.getElementById("dropdownMenu").style.display === "block" ? "none" : "block"; }
    window.onclick = function (event) { if (!event.target.matches('.profile-pic')) { document.getElementById("dropdownMenu").style.display = "none"; } }

    // Description toggle
    function toggleDesc(btn) { const desc = btn.previousElementSibling; desc.classList.toggle('expanded'); btn.textContent = desc.classList.contains('expanded') ? 'Less' : 'More'; }

    // Modal
    function openModal(title, desc, price, email, telegram, whatsapp) {
      document.getElementById("requestModal").style.display = "block";
      document.getElementById("modalTitle").textContent = title;
      document.getElementById("modalDescription").textContent = desc;
      document.getElementById("modalPrice").textContent = price;
      document.getElementById("emailBtn").onclick = () => { window.location.href = `mailto:${email}?subject=Offer for ${title}`; };
      document.getElementById("telegramBtn").onclick = () => { window.open(`https://t.me/${telegram}`, "_blank"); };
      document.getElementById("whatsappBtn").onclick = () => { window.open(`https://wa.me/${whatsapp}`, "_blank"); };
    }
    function closeModal() { document.getElementById("requestModal").style.display = "none"; }

    // Search
    function searchRequests() {
      const term = document.getElementById("searchInput").value.toLowerCase().trim()
      if (!term) { loadRequests(); return }

      let filtered = allRequests.filter(r =>
        (r.title && r.title.toLowerCase().includes(term)) ||
        (r.description && r.description.toLowerCase().includes(term))
      )

      db.from('profiles').select('id, full_name, avatar_url')
        .in('id', [...new Set(filtered.map(r => r.vendor_id))])
        .then(({ data }) => {
          const profileMap = {}
          if (data) data.forEach(p => { profileMap[p.id] = p })
          renderRequests(filtered, profileMap)
        })
    }

    // Filter popup
    function toggleFilterPopup() { const f = document.getElementById("filterPopup"); f.style.display = f.style.display === "block" ? "none" : "block"; }
    function applyFilter() {
      toggleFilterPopup();
      filterRequests();
    }

    // Filtering with Supabase data
    function filterRequests() {
      const cat = document.getElementById("categoryFilter").value;
      const price = document.getElementById("priceFilter").value;

      let filtered = allRequests.filter(r => {
        const category = r.category || 'writing'
        const p = parseFloat(r.price) || 0

        if (cat !== "all" && category !== cat) return false
        if (price === "under20" && p >= 20) return false
        if (price === "20to50" && (p < 20 || p > 50)) return false
        if (price === "above50" && p <= 50) return false
        return true
      })

      db.from('profiles').select('id, full_name, avatar_url')
        .in('id', [...new Set(filtered.map(r => r.vendor_id))])
        .then(({ data }) => {
          const profileMap = {}
          if (data) data.forEach(p => { profileMap[p.id] = p })
          renderRequests(filtered, profileMap)
        })
    }

    // Logout
    async function doLogout() {
      const { error } = await db.auth.signOut()
      if (error) { console.error('Logout error:', error) }
      window.location.replace('index.html?logged=out')
    }
  </script>
</body>

</html>
